# TWIST — single "best-bet" run to break the val plateau (from scratch).
#
# Rationale (from the lap32y0x/8c5afg1k A/B + plateau analysis):
#   * val EPE plateaus ~22px by epoch 6 while train EPE keeps dropping -> a
#     representation/data CEILING, not under-training. The plateau is TWO failures:
#       - delta_avg is fine-localization-limited (only 9%/21% of pts within 1/2px,
#         but 89% within 16px) -> a feature-granularity / sub-cell-refinement issue.
#       - mean EPE is tail-limited (~11% lost/drifting pts dominate the average)
#         -> a data-diversity / matching-robustness issue, NOT a resolution one.
#   * IMAGE_SIZE 448 -> 512   : MODEST lever. DINOv3 patch=16 -> grid 28x28 -> 32x32,
#                               i.e. 16px/cell -> 14px/cell in the 448 eval space (~14%
#                               finer, NOT 2x). And since TARGET_SIZE=448 this UPSAMPLES
#                               a 448 frame (no new detail). Expect a small delta bump at
#                               best; a real localization gain needs TARGET_SIZE raised
#                               too + sub-cell refinement (OBSERVATION.MAX_CORR>0) +
#                               a tighter window (RADIUS_PX). See the sweep notes.
#   * +DynamicReplica in TRAIN: data diversity to close the widening train/val gap
#                               (it was eval-only before) -- the main lever for the EPE tail.
#   * ROLLOUT_WEIGHT 2.0      : kept — the A/B validated it (much better frame-free
#                               forecast at ~zero cost to observed tracking).
#
# RESUME: scratch — this is a fresh ceiling test; we deliberately do NOT warm-start
# from the plateaued live runs (that basin + cross-run confounds would cap it; and
# there is no clean cross-run init knob). Re-submitting the SAME EXPERIMENT_NAME
# auto-resumes this run's own last.pt.
#
# Memory: DINOv3 ViT-L at 512 ~2.5x the 448 encoder cost -> BATCH_SIZE dropped 4->2
# for A100-40. On A100-80 / DDP you can raise it back (see .sbatch_scripts/).
#
# Headline number: run `python evaluate.py --run twist_r512_dynrep --query-mode first`
# (uncapped) on best.pt — the in-training eval below is a capped monitor only.

parameters:

  ###===========================================================================================================================
  ### RUN / GENERAL
  ###===========================================================================================================================
  EXPERIMENT_NAME:
    value: twist_r512_dynrep  # fresh run dir; re-submitting this name auto-resumes its own last.pt
  RESUME:
    value: scratch  # fresh init (NOT warmed from another run; see header)
  WORKERS:
    value: 8
  PIN_MEMORY:
    value: true
  NO_WANDB:
    value: false
  SMOKE:
    value: false
  WANDB_PROJECT:
    value: twist
  SEED:
    value: 42

  ###===========================================================================================================================
  ### MODEL
  ###===========================================================================================================================
  MODEL:
    value:
      MODEL_CLASS: TrackerWorldModel
      MODEL_MODULE: models
      HIDDEN_DIM: 256
      TOKEN_DIM: 256
      RGB_ENCODER:
        ENCODER: facebook/dinov3-vitl16-pretrain-lvd1689m
        IMAGE_SIZE: 512  # 28x28 -> 32x32 grid (16px/cell -> 14px/cell in the 448 eval space; ~14% finer, upsamples a 448 frame). Modest; see header.
        FREEZE_BACKBONE: true
        RGB_ENCODER_LR: 0.0
      OBSERVATION:
        K: 9
        RADIUS_PX: 24.0
        HEADS: 4
        MAX_CORR: 0.0
      TRANSITION:
        DEPTH: 2
        HEADS: 4
        MAX_STEP: 0.12
      ROLLOUT_VEL_DECAY: 1.0
      HEADS:
        UNCERTAINTY: true

  ###===========================================================================================================================
  ### DATA — train mix now includes DynamicReplica (was eval-only) for diversity
  ###===========================================================================================================================
  DATASETS:
    value:
      OVERRIDE_ALL_DATASETS:
        SPLIT_SEED: 42
        TARGET_SIZE: [448, 448]  # frames fed to the model (encoder resizes to IMAGE_SIZE internally)
        CLIP_LEN: 24
        LOAD_FRAMES: true
        LOAD_DEPTHS: false
        FRAMES_AS_FLOAT: false
        MARK_OFFSCREEN_INVISIBLE: true
        POINT_SAMPLE_MODE: even
        QUERY_FRAME: 0
        CLIP_STRIDE: null
        FRAME_STRIDE: 1
        REQUIRE_VISIBLE_AT_QUERY: true
        MIN_VISIBLE_FRAMES: 1

      ### TRAINING + VALIDATION
      KUBRIC:
        VAL_FRACTION: 0.1
        MAX_CLIPS: 1000
      POINTODYSSEY:
        VAL_FRACTION: 0.1
      DYNAMICREPLICA:          # moved into TRAIN (was eval-only) for data diversity
        VAL_FRACTION: 0.1
      CHOLEC80:
        VAL_FRACTION: 1.0      # eval-only surgical validation
        MAX_CLIPS: 20

      ### BENCHMARK EVALUATION (held-out; scored by utilities.evaluation)
      TAPVID_DAVIS:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True
      TAPVID_RGB_STACKING:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True
      ROBOTAP:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True
      SURGICALMOTION:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True
      # TAPVID_KINETICS: left out of the in-training monitor (large); score it
      # offline with evaluate.py for the final headline number.

  ###===========================================================================================================================
  ### TRAINING (ENGINE)
  ###===========================================================================================================================
  BATCH_SIZE:
    value: 2  # 512 encoder memory on A100-40; raise on A100-80 / DDP
  EPOCHS:
    value: 50
  LR:
    value: 3.0e-4
  WEIGHT_DECAY:
    value: 1.0e-4
  OPTIMIZER:
    value: adamw
  GRAD_CLIP:
    value: 1.0
  AMP:
    value: true
  LR_SCHEDULER:
    value: cosine
  WARMUP_EPOCHS:
    value: 3
  MIN_LR_RATIO:
    value: 0.05
  KL_WEIGHT_START:
    value: 0.0
  KL_ANNEAL_EPOCHS:
    value: 5
  TEACHER_FORCING_EPOCHS:
    value: 3
  OBS_DROPOUT:
    value: 0.3
  OBS_DROPOUT_EPOCHS:
    value: 5
  LOSS:
    value:
      POS_WEIGHT: 10.0
      VIS_WEIGHT: 0.5
      KL_WEIGHT: 0.05
      KL_FREE_BITS: 0.02
      KL_BALANCE_ALPHA: 0.8
      HUBER_DELTA: 0.2
      UNC_WEIGHT: 0.0
      PRIOR_WEIGHT: 0.5
      ROLLOUT_WEIGHT: 2.0  # A/B-validated; keep

  ###===========================================================================================================================
  ### VALIDATION
  ###===========================================================================================================================
  VAL_EVERY:
    value: 1
  EARLY_STOP_PATIENCE:
    value: 20
  ROLLOUT_EVAL:
    value: true
  ROLLOUT_OBSERVE_STEPS:
    value: 4

  ###===========================================================================================================================
  ### BENCHMARK EVALUATION
  ###===========================================================================================================================
  EVAL_QUERY_MODE:
    value: first  # TAP-Vid "queried first" (CoTracker-comparable)
  EVAL_AT_END:
    value: true
  EVAL_EVERY:
    value: 10     # capped monitor during training (headline number: evaluate.py uncapped)
  EVAL_MAX_CLIPS:
    value: 30     # cheap monitor; remove / raise for the final number
  EVAL_BATCH_SIZE:
    value: 1
  EVAL_WORKERS:
    value: 4

  ###===========================================================================================================================
  ### LOGGING & VISUALIZATION
  ###===========================================================================================================================
  LOG_EVERY:
    value: 5
  VIZ_EVERY:
    value: 1
  VIZ_VAL_CLIPS:
    value: 1
  VIZ_EVERY_BATCHES:
    value: 50
  VIZ_DENSE_SPACING:
    value: 48
  VIZ_DENSE_MAX_POINTS:
    value: 400
  VIZ_FRAMES:
    value: 48
  VIZ_MAX_POINTS:
    value: 48
  VIZ_SIZE:
    value: 256
  VIZ_TAIL:
    value: 12
  VIZ_DPI:
    value: 56
  VIZ_FPS:
    value: 8
