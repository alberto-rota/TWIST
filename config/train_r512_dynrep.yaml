parameters:

  ###===========================================================================================================================
  ### RUN / GENERAL
  ###===========================================================================================================================
  EXPERIMENT_NAME:
    value:   # fresh run dir; re-submitting this name auto-resumes its own last.pt
  RESUME:
    value: scratch  # fresh init (NOT warmed from another run; see header)
  WORKERS:
    value: 8
  PIN_MEMORY:
    value: true
  NO_WANDB:
    value: false
  SMOKE:
    value: false
  WANDB_PROJECT:
    value: twist
  SEED:
    value: 42

  IMAGE_SIZE:
    value: 512

  ###===========================================================================================================================
  ### MODEL
  ###===========================================================================================================================
  MODEL:
    value:
      MODEL_CLASS: TrackerWorldModel
      MODEL_MODULE: models
      HIDDEN_DIM: 256
      TOKEN_DIM: 256
      RGB_ENCODER:
        ENCODER: facebook/dinov3-vitl16-pretrain-lvd1689m
        # IMAGE_SIZE set by the top-level IMAGE_SIZE knob (see RUN / GENERAL)
        FREEZE_BACKBONE: true
        RGB_ENCODER_LR: 0.0
      OBSERVATION:
        K: 9
        RADIUS_PX: 24.0
        HEADS: 4
        MAX_CORR: 0.0
      TRANSITION:
        DEPTH: 2
        HEADS: 4
        MAX_STEP: 0.12
      ROLLOUT_VEL_DECAY: 1.0
      HEADS:
        UNCERTAINTY: true

  ###===========================================================================================================================
  ### DATA — train mix now includes DynamicReplica (was eval-only) for diversity
  ###===========================================================================================================================
  DATASETS:
    value:
      OVERRIDE_ALL_DATASETS:
        SPLIT_SEED: 42
        # TARGET_SIZE set by the top-level IMAGE_SIZE knob (-> [512, 512]; no upsample)
        CLIP_LEN: 24
        LOAD_FRAMES: true
        LOAD_DEPTHS: false
        FRAMES_AS_FLOAT: false
        MARK_OFFSCREEN_INVISIBLE: true
        POINT_SAMPLE_MODE: even
        QUERY_FRAME: 0
        CLIP_STRIDE: null
        FRAME_STRIDE: 1
        REQUIRE_VISIBLE_AT_QUERY: true
        MIN_VISIBLE_FRAMES: 1

      ### TRAINING + VALIDATION
      KUBRIC:
        VAL_FRACTION: 0.1
        MAX_CLIPS: 1000
      POINTODYSSEY:
        VAL_FRACTION: 0.1
      DYNAMICREPLICA:          # moved into TRAIN (was eval-only) for data diversity
        VAL_FRACTION: 0.1
      CHOLEC80:
        VAL_FRACTION: 1.0      # eval-only surgical validation
        MAX_CLIPS: 20

      ### BENCHMARK EVALUATION (held-out; scored by utilities.evaluation)
      TAPVID_DAVIS:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True
      TAPVID_RGB_STACKING:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True
      ROBOTAP:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True
      SURGICALMOTION:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True
      ENDOTAPP_GT:               # surgical TAP GT (EndoTAPP)
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True
      STIR_CHALLENGE:            # headline surgical benchmark (MICCAI 2024 held-out)
        VAL_FRACTION: 1.0        # native-res; delta over [4,8,16,32,64]px (EVAL_THRESHOLDS in registry)
        IS_EVAL_DATASET: True
      STIR_FULL:                 # larger STIR train/val release
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True
      # SurgT is intentionally absent: only CoTracker pseudo-labels exist here
      # (no GT), so it is a TRAIN-only adaptation set, not an eval benchmark.
      # TAPVID_KINETICS: left out of the in-training monitor (large); score it
      # offline with evaluate.py for the final headline number.
      # NOTE: ENDOTAPP_GT / STIR_* are also auto-selected from DATASET_DEFAULTS
      # (IS_EVAL_DATASET=True there); listed explicitly here for visibility.

  ###===========================================================================================================================
  ### TRAINING (ENGINE)
  ###===========================================================================================================================
  BATCH_SIZE:
    value: 6  # Now TARGET=IMAGE=512: frames are LOADED at 512 (was 448, ~+31% raw-frame
              # memory) instead of being upsampled inside the encoder. The encoder feature
              # grid is 32x32 either way (it already ran at IMAGE_SIZE=512), so the trainable
              # graph is ~unchanged; the only growth is the larger raw frame tensor. bs6 fit
              # at 512 with headroom before, so it should still fit. VERIFY peak_mem_gb on a
              # 2-step smoke; drop to 4 if OOM, push to 8 if there's room.
  EPOCHS:
    value: 50
  LR:
    value: 3.0e-4
  WEIGHT_DECAY:
    value: 1.0e-4
  OPTIMIZER:
    value: adamw
  GRAD_CLIP:
    value: 1.0
  AMP:
    value: true
  LR_SCHEDULER:
    value: cosine
  WARMUP_EPOCHS:
    value: 3
  MIN_LR_RATIO:
    value: 0.05
  KL_WEIGHT_START:
    value: 0.0
  KL_ANNEAL_EPOCHS:
    value: 5
  TEACHER_FORCING_EPOCHS:
    value: 3
  OBS_DROPOUT:
    value: 0.3
  OBS_DROPOUT_EPOCHS:
    value: 5
  LOSS:
    value:
      POS_WEIGHT: 10.0
      VIS_WEIGHT: 0.5
      KL_WEIGHT: 0.05
      KL_FREE_BITS: 0.02
      KL_BALANCE_ALPHA: 0.8
      HUBER_DELTA: 0.2
      UNC_WEIGHT: 0.0
      PRIOR_WEIGHT: 0.5
      ROLLOUT_WEIGHT: 2.0  # A/B-validated; keep

  ###===========================================================================================================================
  ### VALIDATION
  ###===========================================================================================================================
  VAL_EVERY:
    value: 1
  EARLY_STOP_PATIENCE:
    value: 20
  ROLLOUT_EVAL:
    value: true
  ROLLOUT_OBSERVE_STEPS:
    value: 4

  ###===========================================================================================================================
  ### BENCHMARK EVALUATION
  ###===========================================================================================================================
  EVAL_QUERY_MODE:
    value: first  # TAP-Vid "queried first" (CoTracker-comparable)
  EVAL_AT_END:
    value: true
  EVAL_EVERY:
    value: 10     # capped monitor during training (headline number: evaluate.py uncapped)
  EVAL_MAX_CLIPS:
    value: 30     # cheap monitor; remove / raise for the final number
  EVAL_BATCH_SIZE:
    value: 1
  EVAL_WORKERS:
    value: 4

  ###===========================================================================================================================
  ### LOGGING & VISUALIZATION
  ###===========================================================================================================================
  LOG_EVERY:
    value: 5
  VIZ_EVERY:
    value: 1
  VIZ_VAL_CLIPS:
    value: 1
  VIZ_EVERY_BATCHES:
    value: 50
  VIZ_DENSE_SPACING:
    value: 48
  VIZ_DENSE_MAX_POINTS:
    value: 400
  VIZ_FRAMES:
    value: 48
  VIZ_MAX_POINTS:
    value: 48
  VIZ_SIZE:
    value: 256
  VIZ_TAIL:
    value: 12
  VIZ_DPI:
    value: 56
  VIZ_FPS:
    value: 8
