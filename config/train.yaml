parameters:

  EXPERIMENT_NAME:
    value:    # run identity -> $RESULTS_DIR/<name>/; new name = fresh run, same name resumes last.pt.
  RESUME: # "scratch" - "last" - "best" - EXPERIMENT
    value: scratch
  BATCH_SIZE:
    value: 4            # clips per batch (A100-40 fits this comfortably with frozen DINOv3)
  EPOCHS:
    value: 50
  WORKERS:
    value: 8            # DataLoader workers
  PIN_MEMORY:
    value: true
  NO_WANDB:
    value: false
  SMOKE:
    value: false          # real config on a tiny volume (1 epoch, batch 1, few
                          # train/val iters + clips). Also via -s/--smoke. Tune
                          # with SMOKE_TRAIN_STEPS / SMOKE_VAL_STEPS (default 2).
  WANDB_PROJECT:
    value: twist
  SEED:
    value: 42

  ### TRAINING (engine) — optimizer / schedules / logging
  LR:
    value: 3.0e-4          # base LR for the model (non-encoder) param group
  WEIGHT_DECAY:
    value: 1.0e-4
  OPTIMIZER:
    value: adamw           # adamw | adam | sgd
  GRAD_CLIP:
    value: 1.0             # global grad-norm clip (0 disables)
  AMP:
    value: true            # bf16 on A100 (auto fp16+scaler elsewhere; off on CPU)
  LR_SCHEDULER:
    value: cosine          # cosine | none
  WARMUP_EPOCHS:
    value: 3
  MIN_LR_RATIO:
    value: 0.05            # cosine floor (fraction of base LR)
  KL_WEIGHT_START:
    value: 0.0             # anneal KL weight 0 -> MODEL.LOSS.KL_WEIGHT ...
  KL_ANNEAL_EPOCHS:
    value: 10              # ... over this many epochs (0 => constant target)
  TEACHER_FORCING_EPOCHS:
    value: 3               # scheduled-sampling window: per-point GT-feed prob anneals
                           # 1 -> 0 linearly over these epochs, then pure free-running
                           # (no hard cliff -> no train/val gap; teaches error recovery).
                           # Short: GT-fed state makes "stay put" near-optimal, which
                           # was a prop under the static collapse; free-run early so the
                           # model must accumulate real motion under its own dynamics.
  VAL_EVERY:
    value: 1               # validate every N epochs
  LOG_EVERY:
    value: 5              # wandb per-step log interval (train steps): decomposed
                           # losses (pos/vis/kl/unc), EPE, grad-norm, gate, lr, tf_prob
  VIZ_EVERY:
    value: 1               # log pred-vs-GT tracks (both train & val) every N epochs (0 off)
  VIZ_EVERY_BATCHES:
    value: 50             # also log a tracks viz every N train batches (0 off). Each is a
                           # randomly-sampled clip of the current batch, free-running.
  VIZ_FRAMES:
    value: 48              # trim the logged clip to the first N frames (short; 0 = full)
  VIZ_MAX_POINTS:
    value: 48              # subsample to N tracks in the viz (legibility)
  VIZ_SIZE:
    value: 256            # square px of each logged frame (frames are scrubbable via the
                           # viz/frame_number slider on W&B)
  VIZ_TAIL:
    value: 12             # predicted-track motion-trail length (frames) in */pred_tracks
  VIZ_DPI:
    value: 56              # fallback render dpi when VIZ_SIZE is unset
  VIZ_FPS:
    value: 8               # (unused by the frame-slider path; kept for any gif export)
  EARLY_STOP_PATIENCE:
    value: 0               # stop after N epochs without val-EPE improvement (0 off)

  ### MODEL — observation-corrected state-space tracker (see models/)
  MODEL:
    value:
      MODEL_CLASS: TrackerWorldModel
      MODEL_MODULE: models
      HIDDEN_DIM: 256            # GRU dynamics-state width
      TOKEN_DIM: 256             # particle token width
      RGB_ENCODER:
        ENCODER: facebook/dinov3-vitl16-pretrain-lvd1689m  # DINOv3 ViT-L/16 (dim 1024, patch 16); or "cnn"
        IMAGE_SIZE: 448          # encoder's internal square resize -> 16x16 feature grid (16px/cell).
                                 # QUALITY LEVER: 512 -> 32x32 grid (8px/cell) ~doubles localization
                                 # precision (verified) at ~2.5x encoder cost; bump once collapse is
                                 # confirmed broken. Independent of DATASETS.*.TARGET_SIZE (256).
        FREEZE_BACKBONE: true
        RGB_ENCODER_LR: 0.0      # 0.0 => frozen (engine reads this for param groups)
      OBSERVATION:               # local cost-volume soft-argmax localizer
        K: 9                     # KxK feature window (denser sampling for the soft-argmax)
        RADIUS_PX: 24.0          # window half-extent (pixels)
        HEADS: 4
        MAX_CORR: 0.0            # optional zero-init learned sub-cell residual (0 = pure soft-argmax)
      TRANSITION:                # frame-free constant-velocity dynamics prior
        DEPTH: 2                 # inter-point self-attention blocks (rigidity)
        HEADS: 4
        MAX_STEP: 0.12           # max learned residual displacement (normalized ~= 15px);
                                 # prior = pos + last_velocity + this. Keeps the prior
                                 # inside the observation window instead of saturating to ~87px.
      HEADS:
        UNCERTAINTY: true        # predict per-point aleatoric log-variance
      LOSS:
        POS_WEIGHT: 10.0         # position dominates (its per-point value is small)
        VIS_WEIGHT: 0.5          # visibility BCE
        KL_WEIGHT: 0.05          # KL(posterior||prior) — engine anneals this up
        KL_FREE_BITS: 0.5
        KL_BALANCE_ALPHA: 0.8    # pull prior toward posterior harder (Dreamer-style)
        HUBER_DELTA: 0.2         # normalized units
        UNC_WEIGHT: 0.0          # heteroscedastic NLL OFF (it drove total<0 and gamed confidence on the static solution)
        PRIOR_WEIGHT: 0.5        # direct GT supervision of the prior mean (was implicit via KL only -> prior ran away)

  ### DATA
  DATASETS:
    value:
  
      KUBRIC:
        VAL_FRACTION: 0.0           # held out for validation
        SPLIT_SEED: 42              # deterministic split
        CLIP_LEN: 24                # output frames per clip (0/null -> whole sequence)
        FRAME_STRIDE: 1             # keep every Nth frame
        CLIP_STRIDE: null           # null -> non-overlapping clips
        MAX_POINTS: 256
        POINT_SAMPLE_MODE: even     # even | random | grid | first
        QUERY_FRAME: 0              # frame that defines the query points
        REQUIRE_VISIBLE_AT_QUERY: true
        MIN_VISIBLE_FRAMES: 1

        # --- geometry ---        # CROP: [0, 0, 512, 512]    # optional (x0,y0,x1,y1) before resize

        LOAD_FRAMES: true
        LOAD_DEPTHS: false
        FRAMES_AS_FLOAT: false
        MARK_OFFSCREEN_INVISIBLE: true


      POINTODYSSEY:
        # --- train / val split (sequence-level) ---
        VAL_FRACTION: 0.0            # held out for validation
        SPLIT_SEED: 42              # deterministic split

        CLIP_LEN: 24                # == KUBRIC (each stored 48f clip -> 2 sub-clips)
        FRAME_STRIDE: 1             # keep every Nth frame
        CLIP_STRIDE: null           # null -> non-overlapping clips

        # --- spatial sampling density (N tracked points) ---
        MAX_POINTS: 256             # == KUBRIC (subsampled from ~400 stored)
        POINT_SAMPLE_MODE: even     # even | random | grid | first
        QUERY_FRAME: 0              # frame that defines the query points
        REQUIRE_VISIBLE_AT_QUERY: true
        MIN_VISIBLE_FRAMES: 1

        # --- geometry ---
        # --- io ---
        LOAD_FRAMES: true
        LOAD_DEPTHS: false
        FRAMES_AS_FLOAT: false
        MARK_OFFSCREEN_INVISIBLE: true

      CHOLEC80:                     # surgical validation (CoTracker pseudo-label tracks)
        VAL_FRACTION: 1.0           # eval-only: all sequences -> validation
        SPLIT_SEED: 42
        CLIP_LEN: 24                # == train clip length
        FRAME_STRIDE: 1
        CLIP_STRIDE: null           # null -> non-overlapping clips
        MAX_POINTS: 256
        POINT_SAMPLE_MODE: even
        QUERY_FRAME: 0
        REQUIRE_VISIBLE_AT_QUERY: true
        MIN_VISIBLE_FRAMES: 1
        LOAD_FRAMES: true
        LOAD_DEPTHS: false
        FRAMES_AS_FLOAT: false
        MARK_OFFSCREEN_INVISIBLE: true

      TAPVID_DAVIS:
        LOAD_FRAMES: true

      TAPVID_RGB_STACKING:
        LOAD_FRAMES: true

      # ================== OVERRIDE =================
      OVERRIDE_ALL_DATASETS:
        TARGET_SIZE: [448, 448]
        MAX_CLIPS: null