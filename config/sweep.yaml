# TWIST — W&B sweep over the joint Kubric + PointOdyssey pretrain.
#
# Searches the hyper-parameters that most affect dense-tracking QUALITY and
# training STABILITY (LR, the loss-term balance, and the observation window),
# minimizing the headline metric val/epe.
#
# Launch:
#   wandb sweep config/sweep.yaml          # -> SWEEP_ID
#   wandb agent <entity>/<project>/<id>    # runs sweep_agent.py once per trial
#
# sweep_agent.py hands wandb.config straight into run_pipeline (the exact same
# path as `python train.py`). Fixed parts of the config are `{value: ...}`;
# swept fields use `{values: [...]}`. Nested fields are swept with DOTTED names
# (e.g. MODEL.LOSS.KL_WEIGHT), which load_and_process_config folds back into the
# nested MODEL block. method: bayes => the agent proposes promising points; stop
# the agent whenever you have enough trials.

program: sweep_agent.py
method: bayes
metric:
  name: val/epe
  goal: minimize

parameters:

  ### RUN — every trial is its own short run (rename per sweep to avoid clobber)
  EXPERIMENT_NAME:
    value: twist_pretrain_sweep
  WANDB_PROJECT:
    value: twist
  BATCH_SIZE:
    value: 8
  EPOCHS:
    value: 20          # short trials; raise once a region looks good
  WORKERS:
    value: 16
  PIN_MEMORY:
    value: true
  SEED:
    value: 42

  ### TRAINING — fixed engine settings (swept knobs are declared further down)
  WEIGHT_DECAY:
    value: 1.0e-4
  OPTIMIZER:
    value: adamw
  GRAD_CLIP:
    value: 1.0
  AMP:
    value: true
  LR_SCHEDULER:
    value: cosine
  WARMUP_EPOCHS:
    value: 3
  MIN_LR_RATIO:
    value: 0.05
  KL_WEIGHT_START:
    value: 0.0
  KL_ANNEAL_EPOCHS:
    value: 8
  VAL_EVERY:
    value: 1
  LOG_EVERY:
    value: 25
  VIZ_EVERY:
    value: 5

  ### MODEL — fixed base block. Swept nested fields are overridden via the dotted
  ### parameters at the bottom (they must exist here so the override is type-coerced).
  MODEL:
    value:
      MODEL_CLASS: TrackerWorldModel
      MODEL_MODULE: models
      HIDDEN_DIM: 256
      TOKEN_DIM: 256
      RGB_ENCODER:
        ENCODER: facebook/dinov3-vitl16-pretrain-lvd1689m
        IMAGE_SIZE: 256
        FREEZE_BACKBONE: true
        RGB_ENCODER_LR: 0.0
      OBSERVATION: { K: 7, RADIUS_PX: 24.0, HEADS: 4 }
      TRANSITION: { DEPTH: 2, HEADS: 4 }
      HEADS: { UNCERTAINTY: true }
      LOSS:
        POS_WEIGHT: 10.0
        VIS_WEIGHT: 0.5
        KL_WEIGHT: 0.05
        KL_FREE_BITS: 0.5
        KL_BALANCE_ALPHA: 0.8
        HUBER_DELTA: 0.2
        UNC_WEIGHT: 0.02

  ### DATA — joint pretrain (both datasets, matched (T,N,H,W) so they batch together)
  DATASETS:
    value:
      KUBRIC:
        VAL_FRACTION: 0.1
        SPLIT_SEED: 42
        CLIP_LEN: 24
        FRAME_STRIDE: 1
        MAX_POINTS: 256
        POINT_SAMPLE_MODE: even
        TARGET_SIZE: [256, 256]
      POINTODYSSEY:
        VAL_FRACTION: 0.1
        SPLIT_SEED: 42
        CLIP_LEN: 24
        FRAME_STRIDE: 1
        MAX_POINTS: 256
        POINT_SAMPLE_MODE: even
        TARGET_SIZE: [256, 256]

  ### SWEPT KNOBS ------------------------------------------------------------
  LR:
    values: [1.5e-4, 3.0e-4, 5.0e-4]
  TEACHER_FORCING_EPOCHS:        # scheduled-sampling decay window
    values: [5, 10, 15]
  MODEL.LOSS.POS_WEIGHT:         # how hard the direct position term dominates
    values: [5.0, 10.0, 20.0]
  MODEL.LOSS.KL_WEIGHT:          # dynamics-prior regularization strength
    values: [0.02, 0.05, 0.1]
  MODEL.OBSERVATION.RADIUS_PX:   # cost-volume window half-extent (match range)
    values: [16.0, 24.0, 32.0]
