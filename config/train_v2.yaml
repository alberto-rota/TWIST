# TWIST v2 — full Kubric pretraining with the 2026-07 diagnosis improvements ON.
# ============================================================================================
#
# Base = config/train_best.yaml (the validated snowy-sweep-1 winner, Kubric-only,
# uncapped). Everything below marked [v2] is new; the rationale is the 2026-07-02
# diagnosis (see CLAUDE.md "v2 improvements"):
#
#   [v2-F1] THROUGH-OCCLUSION SUPERVISION — the loss position terms (pos / prior /
#        rollout) now use the reader's `pos_valid` mask: visible frames PLUS
#        occluded-but-in-frame frames on HAS_OCCLUDED_GT datasets (Kubric stores
#        real coords on its ~28% occluded frames — previously all discarded).
#        Automatic via the registry; LOSS.USE_OCCLUDED_GT=true (the default).
#   [v2-F4a] HUBER_DELTA 0.2 -> 0.02 (~51px -> ~5px @512): errors beyond ~5px now
#        get L1 (constant) instead of L2 (vanishing-toward-0) gradients — the
#        untested tight-threshold precision lever (delta_1px/2px were stuck).
#   [v2-F4b] CE_WEIGHT / GLOBAL_CE_WEIGHT: direct cross-entropy on the local cost
#        volume + the global map — matcher supervision that bypasses the Kalman
#        gate (a shy gate can no longer starve the matcher of gradient).
#   [v2-F2] OBS_DROPOUT is now PER-POINT in contiguous 3-8 frame spans (simulated
#        occlusion; neighbours keep observing and carry the masked point through
#        the transition attention) instead of whole-frame i.i.d.
#   [v2-F3] MODEL.OBSERVATION.COARSE: global template re-acquisition stage —
#        confidence-gated window re-centering, so a point whose prior drifted
#        beyond the 24px window during occlusion can still snap back.
#   [v2-F5] Functional uncertainty: UNC_WEIGHT 0.5 trains the (decoupled) post +
#        prior log-variances; MODEL.OBSERVATION.STATS feeds them + correlation
#        peak/entropy/margin to the vis/gate/logvar heads; KL_WEIGHT -> 0 (it
#        pinned at the free-bits floor and contributed nothing — kl_raw is still
#        logged). TRANSITION.VIS_INPUT gives the dynamics the visibility belief.
#   [v2] ROLLOUT_OBSERVE_MIN/MAX randomize the train-time coast start (eval keeps
#        the fixed 4-step protocol).
#
# NEW ARCHITECTURE = NEW STATE_DICT (trunk/coarse/to_token shapes change with the
# flags): do NOT resume a v1 checkpoint into this config — fresh EXPERIMENT_NAME.
#
# Launch (A100-80, one GPU; re-submit the same EXPERIMENT_NAME to auto-resume):
#   python train.py config/train_v2.yaml
# Memory: v1 measured ~75 GB peak @ bs6/512. The coarse stage adds the global-map
# activations (~1-2 GB) — VERIFY peak_mem_gb on a 2-step smoke; drop to 4 if OOM.
# CLIP_LEN stays 24 to isolate the v2 deltas; 48 (longer occlusions per clip) is
# the next lever after this run baselines.

parameters:

  ###===========================================================================================================================
  ### RUN / GENERAL
  ###===========================================================================================================================
  EXPERIMENT_NAME:
    # FIXED name + RESUME=last: a SLURM-timeout resubmit CONTINUES from last.pt
    # (the blank-name + scratch combo lost absurd-dust-35 and both 640/768
    # resolution-sweep runs to the 24h wall).
    value: twist_v2_kubric_r512
  RESUME:
    value: last     # in-stage resume from last.pt (fresh init on first run)
  WORKERS:
    value: 8
  PIN_MEMORY:
    value: true
  NO_WANDB:
    value: false
  SMOKE:
    value: false
  WANDB_PROJECT:
    value: twist
  SEED:
    value: 42

  IMAGE_SIZE:
    value: 512

  ###===========================================================================================================================
  ### MODEL — v1 winner geometry (K=9 / RAD=24 / MC=0) + the v2 blocks
  ###===========================================================================================================================
  MODEL:
    value:
      MODEL_CLASS: TrackerWorldModel
      MODEL_MODULE: models
      HIDDEN_DIM: 256
      TOKEN_DIM: 256
      RGB_ENCODER:
        ENCODER: facebook/dinov3-vitl16-pretrain-lvd1689m
        # IMAGE_SIZE set by the top-level IMAGE_SIZE knob (see RUN / GENERAL)
        FREEZE_BACKBONE: true
        RGB_ENCODER_LR: 0.0
      OBSERVATION:
        K: 9
        RADIUS_PX: 24.0     # winning fine-loc window (RAD=16 was the worse half)
        HEADS: 4
        MAX_CORR: 0.0       # pure soft-argmax (0.05 sub-cell residual did not help)
        STATS: true         # [v2-F5] corr peak/entropy/margin + prior logvar -> heads
        COARSE: true        # [v2-F3] global re-acquisition stage (gated re-centering)
      TRANSITION:
        DEPTH: 2
        HEADS: 4
        MAX_STEP: 0.12
        VIS_INPUT: true     # [v2-F5] dynamics sees the visibility belief
      ROLLOUT_VEL_DECAY: 1.0
      HEADS:
        UNCERTAINTY: true

  ###===========================================================================================================================
  ### DATA — TRAIN: full KUBRIC only (HAS_OCCLUDED_GT in registry -> pos_valid).
  ###          EVAL: held-out benchmarks (never trained on).
  ###===========================================================================================================================
  DATASETS:
    value:
      OVERRIDE_ALL_DATASETS:
        SPLIT_SEED: 42
        # TARGET_SIZE set by the top-level IMAGE_SIZE knob (-> [512, 512]; no upsample)
        CLIP_LEN: 24
        LOAD_FRAMES: true
        LOAD_DEPTHS: false
        FRAMES_AS_FLOAT: false
        MARK_OFFSCREEN_INVISIBLE: true
        POINT_SAMPLE_MODE: even
        QUERY_FRAME: 0
        CLIP_STRIDE: null
        FRAME_STRIDE: 1
        REQUIRE_VISIBLE_AT_QUERY: true
        MIN_VISIBLE_FRAMES: 1

      ### TRAINING + VALIDATION — KUBRIC ONLY, full dataset (no MAX_CLIPS cap)
      KUBRIC:
        VAL_FRACTION: 0.1   # 90% train / 10% in-training val; UNCAPPED = full Kubric

      ### BENCHMARK EVALUATION (held-out; scored by utilities.evaluation; not trained on)
      TAPVID_DAVIS:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True
      TAPVID_RGB_STACKING:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True
      ROBOTAP:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True
      SURGICALMOTION:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True
      ENDOTAPP_GT:               # surgical TAP GT (EndoTAPP)
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True
      STIR_CHALLENGE:            # headline surgical benchmark (MICCAI 2024 held-out)
        VAL_FRACTION: 1.0        # AJ/OA excluded from eval/MEAN (registry), delta@[4..64] kept
        IS_EVAL_DATASET: True
      # TAPVID_KINETICS: left out of the in-training monitor (large); score it
      # offline with evaluate.py for the final headline number.

  ###===========================================================================================================================
  ### TRAINING (ENGINE)
  ###===========================================================================================================================
  BATCH_SIZE:
    value: 4  # v1 measured ~75 GB peak @ 512; the coarse stage adds ~1-2 GB of global-map
              # activations. VERIFY peak_mem_gb on a 2-step smoke; drop to 4 if OOM.
  EPOCHS:
    value: 50
  LR:
    value: 3.0e-4
  WEIGHT_DECAY:
    value: 1.0e-4
  OPTIMIZER:
    value: adamw
  GRAD_CLIP:
    value: 1.0
  AMP:
    value: true
  LR_SCHEDULER:
    value: cosine
  WARMUP_EPOCHS:
    value: 3
  MIN_LR_RATIO:
    value: 0.05
  KL_WEIGHT_START:
    value: 0.0
  KL_ANNEAL_EPOCHS:
    value: 0      # [v2-F5] KL retired (target 0 below) — nothing to anneal
  TEACHER_FORCING_EPOCHS:
    value: 3
  OBS_DROPOUT:
    value: 0.3    # expected dropped fraction of post-query steps (now per-point spans)
  OBS_DROPOUT_EPOCHS:
    value: 5
  OBS_DROPOUT_SPAN:
    value: [3, 8] # [v2-F2] contiguous per-point span length (frames) — simulated occlusion
  LOSS:
    value:
      POS_WEIGHT: 10.0
      VIS_WEIGHT: 0.5
      KL_WEIGHT: 0.0        # [v2-F5] retired (pinned at free-bits floor, zero gradient);
      KL_FREE_BITS: 0.02    #         kl/kl_raw still logged for the record
      KL_BALANCE_ALPHA: 0.8
      HUBER_DELTA: 0.02     # [v2-F4a] ~5px @512: L1-like beyond that -> tight-threshold pressure
      UNC_WEIGHT: 0.5       # [v2-F5] decoupled NLL trains post+prior logvars (calibration)
      PRIOR_WEIGHT: 0.5
      ROLLOUT_WEIGHT: 2.0   # A/B-validated winner; now also supervised through occlusion
      CE_WEIGHT: 0.5        # [v2-F4b] local cost-volume cross-entropy (gate-independent)
      GLOBAL_CE_WEIGHT: 0.25  # [v2-F4b] global-map CE (trains re-detection; coarse stage)
      USE_OCCLUDED_GT: true   # [v2-F1] position terms use pos_valid (occluded GT)

  ###===========================================================================================================================
  ### VALIDATION
  ###===========================================================================================================================
  VAL_EVERY:
    value: 1
  EARLY_STOP_PATIENCE:
    value: 20
  ROLLOUT_EVAL:
    value: true
  ROLLOUT_OBSERVE_STEPS:
    value: 4      # eval protocol: FIXED (comparable to every previous run)
  ROLLOUT_OBSERVE_MIN:
    value: 2      # [v2] train-time rollout loss resamples observe length per batch
  ROLLOUT_OBSERVE_MAX:
    value: 8

  ###===========================================================================================================================
  ### BENCHMARK EVALUATION
  ###===========================================================================================================================
  EVAL_QUERY_MODE:
    value: first  # TAP-Vid "queried first" (CoTracker-comparable)
  EVAL_AT_END:
    value: true
  EVAL_EVERY:
    value: 10     # capped monitor during training (headline number: evaluate.py uncapped)
  EVAL_MAX_CLIPS:
    value: 30     # cheap monitor; remove / raise for the final number
  EVAL_BATCH_SIZE:
    value: 1
  EVAL_WORKERS:
    value: 4

  ###===========================================================================================================================
  ### LOGGING & VISUALIZATION
  ###===========================================================================================================================
  LOG_EVERY:
    value: 5
  VIZ_EVERY:
    value: 1
  VIZ_VAL_CLIPS:
    value: 1
  VIZ_EVERY_BATCHES:
    value: 50
  VIZ_DENSE_SPACING:
    value: 48
  VIZ_DENSE_MAX_POINTS:
    value: 400
  VIZ_FRAMES:
    value: 48
  VIZ_MAX_POINTS:
    value: 48
  VIZ_SIZE:
    value: 256
  VIZ_TAIL:
    value: 12
  VIZ_DPI:
    value: 56
  VIZ_FPS:
    value: 8
