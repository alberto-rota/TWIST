# TWIST — tiny smoke-test config. A few sequences, short clips, sparse points,
# small frames — builds in seconds. Equivalent to `python train.py -b`.
#
#   python train.py config/smoke.yaml

parameters:

  EXPERIMENT_NAME:
    value: kubric_smoke
  BATCH_SIZE:
    value: 2
  EPOCHS:
    value: 2
  WORKERS:
    value: 2
  NO_WANDB:
    value: true
  SEED:
    value: 0

  ### TRAINING (engine) — CPU-fast: no AMP, no scheduler, no KL/TF curriculum
  LR:
    value: 1.0e-3
  WEIGHT_DECAY:
    value: 0.0
  OPTIMIZER:
    value: adamw
  GRAD_CLIP:
    value: 1.0
  AMP:
    value: false
  LR_SCHEDULER:
    value: none
  KL_ANNEAL_EPOCHS:
    value: 0
  TEACHER_FORCING_EPOCHS:
    value: 0
  VAL_EVERY:
    value: 1
  LOG_EVERY:
    value: 5
  VIZ_EVERY:
    value: 0              # no wandb in smoke anyway

  ### MODEL — tiny CNN encoder: no download, CPU-fast
  MODEL:
    value:
      MODEL_CLASS: TrackerWorldModel
      MODEL_MODULE: models
      HIDDEN_DIM: 64
      TOKEN_DIM: 64
      RGB_ENCODER:
        ENCODER: cnn             # from-scratch conv stack (no network)
        FEATURE_DIM: 48
        PATCH_SIZE: 8
        FREEZE_BACKBONE: false
        RGB_ENCODER_LR: 1.0e-3
      OBSERVATION: { K: 7, RADIUS_PX: 16.0, HEADS: 2 }
      TRANSITION: { DEPTH: 1, HEADS: 2 }
      HEADS: { UNCERTAINTY: true }
      LOSS:
        POS_WEIGHT: 10.0
        VIS_WEIGHT: 0.5
        KL_WEIGHT: 0.05
        KL_FREE_BITS: 0.5
        HUBER_DELTA: 0.2
        UNC_WEIGHT: 0.02

  DATASETS:
    value:
      KUBRIC:
        MAX_SEQUENCES: 6          # only look at the first 6 sequences
        VAL_FRACTION: 0.34        # ~4 train / 2 val
        SPLIT_SEED: 0
        CLIP_LEN: 8
        FRAME_STRIDE: 2
        MAX_CLIPS_PER_VIDEO: 3
        MAX_POINTS: 64
        POINT_SAMPLE_MODE: even
        TARGET_SIZE: [128, 128]
        LOAD_FRAMES: true
