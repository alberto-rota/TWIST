parameters:

  ###===========================================================================================================================
  ### RUN / GENERAL
  ###===========================================================================================================================
  EXPERIMENT_NAME:
    value: abl_resample_r512
  RESUME:
    value: last
  WORKERS:
    value: 8
  PIN_MEMORY:
    value: true
  NO_WANDB:
    value: false
  SMOKE:
    value: false
  WANDB_PROJECT:
    value: twist
  SEED:
    value: 42

  IMAGE_SIZE:
    value: 512

  ###===========================================================================================================================
  ### MODEL — verbatim from config/exhausted/train_best.yaml (snowy-sweep-1 winner). No arch change => resume-safe.
  ###===========================================================================================================================
  MODEL:
    value:
      MODEL_CLASS: TrackerWorldModel
      MODEL_MODULE: models
      HIDDEN_DIM: 256
      TOKEN_DIM: 256
      RGB_ENCODER:
        ENCODER: facebook/dinov3-vitl16-pretrain-lvd1689m
        FREEZE_BACKBONE: true
        RGB_ENCODER_LR: 0.0
      OBSERVATION:
        K: 9
        RADIUS_PX: 24.0
        HEADS: 4
        MAX_CORR: 0.0
      TRANSITION:
        DEPTH: 2
        HEADS: 4
        MAX_STEP: 0.12
      ROLLOUT_VEL_DECAY: 1.0
      HEADS:
        UNCERTAINTY: true

  ###===========================================================================================================================
  ### DATA — KUBRIC-only train. THE FLIPPED BLOCK: sampler = random, resampled fresh every epoch.
  ###===========================================================================================================================
  DATASETS:
    value:
      OVERRIDE_ALL_DATASETS:
        SPLIT_SEED: 42
        CLIP_LEN: 24
        LOAD_FRAMES: true
        LOAD_DEPTHS: false
        FRAMES_AS_FLOAT: false
        MARK_OFFSCREEN_INVISIBLE: true
        POINT_SAMPLE_MODE: random         # <-- required: only the seeded sampler varies per epoch
        RESAMPLE_POINTS_PER_EPOCH: true   # <-- THE LEVER: draw a different N-point subset each epoch
        QUERY_FRAME: 0
        CLIP_STRIDE: null
        FRAME_STRIDE: 1
        REQUIRE_VISIBLE_AT_QUERY: true
        MIN_VISIBLE_FRAMES: 1
        RESIZE_MODE: cover

      KUBRIC:
        VAL_FRACTION: 0.1

      TAPVID_DAVIS:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True
      TAPVID_RGB_STACKING:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True
      ROBOTAP:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True
      SURGICALMOTION:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True
      ENDOTAPP_GT:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True
      STIR_CHALLENGE:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True

  ###===========================================================================================================================
  ### TRAINING (ENGINE) — validated winner schedule; EPOCHS 20 for a ranking run.
  ###===========================================================================================================================
  BATCH_SIZE:
    value: 6
  EPOCHS:
    value: 20
  LR:
    value: 3.0e-4
  WEIGHT_DECAY:
    value: 1.0e-4
  OPTIMIZER:
    value: adamw
  GRAD_CLIP:
    value: 1.0
  AMP:
    value: true
  LR_SCHEDULER:
    value: cosine
  WARMUP_EPOCHS:
    value: 3
  MIN_LR_RATIO:
    value: 0.05
  KL_WEIGHT_START:
    value: 0.0
  KL_ANNEAL_EPOCHS:
    value: 5
  TEACHER_FORCING_EPOCHS:
    value: 3
  OBS_DROPOUT:
    value: 0.3
  OBS_DROPOUT_EPOCHS:
    value: 5
  LOSS:
    value:
      POS_WEIGHT: 10.0
      VIS_WEIGHT: 0.5
      KL_WEIGHT: 0.05
      KL_FREE_BITS: 0.02
      KL_BALANCE_ALPHA: 0.8
      HUBER_DELTA: 0.2
      UNC_WEIGHT: 0.0
      PRIOR_WEIGHT: 0.5
      ROLLOUT_WEIGHT: 2.0

  ###===========================================================================================================================
  ### VALIDATION
  ###===========================================================================================================================
  VAL_EVERY:
    value: 1
  VAL_SUBSAMPLE:
    value: 0.15
  EARLY_STOP_PATIENCE:
    value: 20
  ROLLOUT_EVAL:
    value: true
  ROLLOUT_OBSERVE_STEPS:
    value: 4

  ###===========================================================================================================================
  ### BENCHMARK EVALUATION
  ###===========================================================================================================================
  EVAL_QUERY_MODE:
    value: first
  EVAL_AT_END:
    value: true
  EVAL_EVERY:
    value: 10
  EVAL_MAX_CLIPS:
    value: 30
  EVAL_BATCH_SIZE:
    value: 1
  EVAL_WORKERS:
    value: 4

  ###===========================================================================================================================
  ### LOGGING & VISUALIZATION
  ###===========================================================================================================================
  LOG_EVERY:
    value: 5
  VIZ_EVERY:
    value: 5

### ==========================================================================================================================
### ablation_pointsample_resample.yaml — EPOCH-VARYING POINT RESAMPLING ablation (Law 2: ONE lever)
### ==========================================================================================================================
### Provenance: byte-for-byte config/exhausted/train_best.yaml (= snowy-sweep-1 fqbpeml7, the stable base) with
###   the same EPOCHS 50 -> 20 ranking-run delta as ablation_pointsample_grid.yaml, and ONE experimental block:
###   POINT_SAMPLE_MODE random + RESAMPLE_POINTS_PER_EPOCH true.
###
### The lever (dataset/base.py set_epoch + _sample_seed; engine calls set_epoch on train readers each epoch):
###   Baseline sampling draws ONE fixed N-point subset per clip and reuses it every epoch (seed = SEED + clip_idx),
###   so training only ever sees that fixed ~0.8% of Kubric's 32,768 stored tracks. With this on, the per-clip
###   seed also folds in the epoch, so each epoch draws a DIFFERENT random subset — over 20 epochs the model sees
###   far more of the stored trajectories, at NO extra per-batch memory (unlike raising MAX_POINTS, which is
###   O(N^2) in the inter-point attention). A mild, memory-free supervision-coverage augmentation. Val is held
###   fixed automatically (create_datasets_from_config disables resampling + forces even on val readers), so
###   val/epe stays a stable yardstick.
###
### CONTROL (isolates the resampling variable — same random sampler, but STATIC across epochs):
###   sbatch .sbatch_scripts/train_A100_80_single.sbatch config/ablation_pointsample_resample.yaml \
###       --DATASETS.OVERRIDE_ALL_DATASETS.RESAMPLE_POINTS_PER_EPOCH=false \
###       --EXPERIMENT_NAME=abl_randstatic_r512
###   (For the wider reference vs the current 'even' default, compare against abl_even_r512 from the grid file.)
###
### Launch (A100-80, single GPU; resubmit continues from last.pt):
###   sbatch .sbatch_scripts/train_A100_80_single.sbatch config/ablation_pointsample_resample.yaml
###
### Judge at MATCHED epochs: primarily val/epe and the occlusion axis (epe_occ, gate_vis/gate_occ separation,
### val/rollout/epe) — richer/fresher supervision, if it helps at all, should show there first. Per-dataset
### delta_avg/AJ on the eval sets for the headline. Like grid, this is a supervision-distribution lever, not a
### fix for the delta-precision (feature-stride) or long-horizon-drift walls — temper the AJ expectation.
### ==========================================================================================================================
