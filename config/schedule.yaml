# TWIST — phased training schedule.
#
# Training runs as an ordered list of STAGES. Each stage is a block of top-level
# config overrides (most importantly DATASETS) layered onto the base config, so a
# phase can swap dataset / sampling / (later) model & loss while sharing the rest.
#
#   python train.py config/schedule.yaml                  # run the whole schedule
#   python train.py config/schedule.yaml --start-stage 1  # only from stage 1 on
#   python train.py config/schedule.yaml --resume-run kubric_then_x  # continue where it stopped
#
# A run is identified by EXPERIMENT_NAME and tracked in
# $RESULTS_DIR/<EXPERIMENT_NAME>/run_state.json; once the engine lands, a stage is
# marked complete after its training finishes and --resume-run picks up at the next.
#
# Phases (per CORE.md): stage 0 Kubric pretrain -> stage 1 PointOdyssey
# long-horizon (real data, wired in dataset/wrappers.py) -> stage 2 surgical
# Cholec80 adaptation. Each stage carries the previous stage's weights.
# (For a SINGLE joint Kubric+PointOdyssey pretrain stage instead, use config/train.yaml.)

program: train.py
method: grid

parameters:

  EXPERIMENT_NAME:
    value: twist_phased
  BATCH_SIZE:
    value: 8
  WORKERS:
    value: 16
  NO_WANDB:
    value: false
  WANDB_PROJECT:
    value: twist
  SEED:
    value: 42

  ### TRAINING (engine) — shared across stages (a stage may override any of these,
  ### e.g. a smaller LR for surgical fine-tuning). EPOCHS is set per-stage below.
  LR:
    value: 3.0e-4
  WEIGHT_DECAY:
    value: 1.0e-4
  OPTIMIZER:
    value: adamw
  GRAD_CLIP:
    value: 1.0
  AMP:
    value: true
  LR_SCHEDULER:
    value: cosine
  WARMUP_EPOCHS:
    value: 2
  KL_WEIGHT_START:
    value: 0.0
  KL_ANNEAL_EPOCHS:
    value: 10
  TEACHER_FORCING_EPOCHS:
    value: 3
  VAL_EVERY:
    value: 1
  VIZ_EVERY:
    value: 5

  ### MODEL — shared base; a stage may override the whole MODEL block (e.g. to
  ### unfreeze the encoder). Like DATASETS, a stage's MODEL is replace-not-merge.
  MODEL:
    value:
      MODEL_CLASS: TrackerWorldModel
      MODEL_MODULE: models
      HIDDEN_DIM: 256
      TOKEN_DIM: 256
      RGB_ENCODER:
        ENCODER: facebook/dinov3-vitl16-pretrain-lvd1689m
        IMAGE_SIZE: 256
        FREEZE_BACKBONE: true
        RGB_ENCODER_LR: 0.0
      OBSERVATION: { K: 9, RADIUS_PX: 24.0, HEADS: 4, MAX_CORR: 0.0 }
      TRANSITION: { DEPTH: 2, HEADS: 4, MAX_STEP: 0.12 }
      HEADS: { UNCERTAINTY: true }
      LOSS: { POS_WEIGHT: 10.0, VIS_WEIGHT: 0.5, KL_WEIGHT: 0.05, KL_FREE_BITS: 0.5, HUBER_DELTA: 0.2, UNC_WEIGHT: 0.0, PRIOR_WEIGHT: 0.5 }

  STAGES:
    value:
      # --- Stage 0: Phase-1 pretraining on Kubric (dense GT, short clips) ---
      - NAME: pretrain_kubric
        EPOCHS: 50
        DATASETS:
          KUBRIC:
            VAL_FRACTION: 0.1
            SPLIT_SEED: 42
            CLIP_LEN: 24
            FRAME_STRIDE: 1
            MAX_POINTS: 256
            POINT_SAMPLE_MODE: even
            TARGET_SIZE: [256, 256]

      # --- Stage 1: long-horizon phase on PointOdyssey (real data; stored clips
      #     are 48-frame, ~400-point). Forces a useful frame-free dynamics prior
      #     and stress-tests long rollout / occlusion. Carries stage 0's weights. ---
      # To also fine-tune the encoder in this stage, add a full MODEL block here
      # with FREEZE_BACKBONE: false and a small RGB_ENCODER_LR (e.g. 1.0e-5) — the
      # engine builds per-stage param groups from it. (Omitted: inherits the base
      # MODEL, i.e. frozen encoder.)
      - NAME: longhorizon_pointodyssey
        EPOCHS: 30
        DATASETS:
          POINTODYSSEY:
            VAL_FRACTION: 0.1
            SPLIT_SEED: 42
            CLIP_LEN: 48            # whole stored clip -> longest horizon available
            FRAME_STRIDE: 1
            MAX_POINTS: 256
            POINT_SAMPLE_MODE: even
            TARGET_SIZE: [256, 256]

      # --- Stage 2: surgical adaptation. The pre-tracked surgical datasets are
      #     read through the *same* config-driven API as Kubric (see
      #     dataset.base.BaseTracksDataset): identical sampling / geometry /
      #     query keys, just a different DATASETS block. The previous stage's
      #     weights carry over (cross-stage weight carry). Swap / add ENDOTAPP
      #     or SURGT here the same way. ---
      - NAME: surgical_cholec80
        EPOCHS: 20
        LR: 1.0e-4
        DATASETS:
          CHOLEC80:
            VAL_FRACTION: 0.1
            SPLIT_SEED: 42
            CLIP_LEN: 24
            FRAME_STRIDE: 1
            MAX_POINTS: 256
            POINT_SAMPLE_MODE: even
            QUERY_FRAME: 0
            TARGET_SIZE: [256, 256]
