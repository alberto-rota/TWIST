

parameters:

  ###===========================================================================================================================
  ### RUN / GENERAL
  ###===========================================================================================================================
  EXPERIMENT_NAME:
    value: null            # optional override; leave null when forking — RESUME + RESUME_NAME set the output name
  RESUME:
    value: resilient-plasma-130:best   # source run (+ optional :last|:best); or scratch | last | best for in-run
  RESUME_NAME:
    value: "{source}_surg"       # output name template; {source} = RESUME run name
  RESUME_CHECKPOINT:
    value: best             # last|best when RESUME is a source run without an explicit :last|:best suffix
  WORKERS:
    value: 8
  PIN_MEMORY:
    value: true
  NO_WANDB:
    value: false
  WANDB_PROJECT:
    value: twist
  SEED:
    value: 42

  ###===========================================================================================================================
  ### DDP LR SCALING
  ###===========================================================================================================================
  # none   -> LR invariant to GPU count. Pair with per-GPU BATCH_SIZE = global/N to hold the effective batch fixed.
  # sqrt   -> LR *= sqrt(N). Use when GROWING the effective batch (per-GPU batch fixed); correct rule for AdamW.
  # linear -> LR *= N (Goyal SGD rule). Overshoots here. Not recommended.
  LR_SCALING:
    value: none

  ###===========================================================================================================================
  ### MODEL — exact resolved architecture from t7imej6u (RADIUS_PX=16 EFFECTIVE)
  ###===========================================================================================================================
  MODEL:
    value:
      MODEL_CLASS: TrackerWorldModel
      MODEL_MODULE: models
      HIDDEN_DIM: 256
      TOKEN_DIM: 256
      RGB_ENCODER:
        ENCODER: facebook/dinov3-vitl16-pretrain-lvd1689m
        IMAGE_SIZE: 512
        FREEZE_BACKBONE: true
        RGB_ENCODER_LR: 0.0
        # PRECISION LEVER (OFF): null = final DINOv3 hidden state (v1/baseline). An int
        # (e.g. -4) reads a mid-transformer layer as the dense feature map — earlier
        # layers can carry finer spatial detail than the semantics-tuned last block.
        # A candidate lever for the delta_1px/2px wall. dino only. Keep null to reproduce.
        FEATURE_LAYER: null
      OBSERVATION:
        K: 9
        RADIUS_PX: 16       # t7imej6u effective value (NOT 24)
        HEADS: 4
        MAX_CORR: 0.0
      TRANSITION:
        DEPTH: 2
        HEADS: 4
        MAX_STEP: 0.12
      ROLLOUT_VEL_DECAY: 1.0
      HEADS:
        UNCERTAINTY: true
      FEATURE_UPSAMPLE:
        ENABLED: false
        FACTOR: 2
        BOTTLENECK: 256

  ###===========================================================================================================================
  ### DATA — the 6-dataset red roster, with CHOLEC80 scaled up to 2000 training clips
  ###===========================================================================================================================
  DATASETS:
    value:
      OVERRIDE_ALL_DATASETS:
        SPLIT_SEED: 42
        TARGET_SIZE: [512, 512]
        CLIP_LEN: 24
        LOAD_FRAMES: true
        LOAD_DEPTHS: false
        FRAMES_AS_FLOAT: false
        MARK_OFFSCREEN_INVISIBLE: true
        POINT_SAMPLE_MODE: even
        QUERY_FRAME: 0
        CLIP_STRIDE: null
        FRAME_STRIDE: 1
        REQUIRE_VISIBLE_AT_QUERY: true
        MIN_VISIBLE_FRAMES: 1
        # GEOMETRY LEVER (OFF): cover = aspect-preserving resize + center-crop (v1
        # internal harness). stretch = anisotropic squash, NO crop = the canonical
        # TAP-Vid protocol; use with TARGET_SIZE [256,256] for numbers comparable to
        # published CoTracker3 tables (cover@512 crops ~44% of DAVIS width). Keep cover
        # to reproduce; applies to train + val readers alike.
        RESIZE_MODE: cover

      KUBRIC:
        MAX_CLIPS: 1000
        VAL_FRACTION: -1

      CHOLEC80:
        MAX_CLIPS: 1000     # scaled up from the baseline's 20 (token presence) to a real surgical training signal
        VAL_FRACTION: 0.1   # ~1800 train / 200 val (was VAL_FRACTION 1 = all-val at 20 clips)

      POINTODYSSEY:
        VAL_FRACTION: -1

      TAPVID_DAVIS:
        VAL_FRACTION: -1
        IS_EVAL_DATASET: true

      DYNAMICREPLICA:
        VAL_FRACTION: -1

      SURGICALMOTION:
        VAL_FRACTION: 1
        IS_EVAL_DATASET: true

  ###===========================================================================================================================
  ### TRAINING (ENGINE) — exact schedule from t7imej6u
  ###===========================================================================================================================
  BATCH_SIZE:
    value: 4               # t7imej6u's per-GPU value. NB: bs8 @512 (~100 GB) does NOT fit on one 80GB card;
                           # override per-launch (single-GPU: --BATCH_SIZE=6; DDP 2x4 reaches effective 8).
  EPOCHS:
    value: 25
  LR:
    value: 1.0e-5          # single-GPU value; LR_SCALING (above) decides what happens under DDP
  WEIGHT_DECAY:
    value: 1.0e-4
  OPTIMIZER:
    value: adamw
  GRAD_CLIP:
    value: 1.0
  AMP:
    value: true
  LR_SCHEDULER:
    value: cosine
  WARMUP_EPOCHS:
    value: 3
  MIN_LR_RATIO:
    value: 0.05
  KL_WEIGHT_START:
    value: 0.0
  KL_ANNEAL_EPOCHS:
    value: 5
  TEACHER_FORCING_EPOCHS:
    value: 3
  OBS_DROPOUT:
    value: 0.3
  OBS_DROPOUT_EPOCHS:
    value: 5
  LOSS:
    value:
      POS_WEIGHT: 10.0
      VIS_WEIGHT: 0.5
      KL_WEIGHT: 0.05
      KL_FREE_BITS: 0.02
      KL_BALANCE_ALPHA: 0.8
      HUBER_DELTA: 0.2
      UNC_WEIGHT: 0.0
      PRIOR_WEIGHT: 0.5
      ROLLOUT_WEIGHT: 2.0

  ###===========================================================================================================================
  ### VALIDATION  —  VAL_SUBSAMPLE null to match t7imej6u (validated on the full val set).
  ###                Safe here: no SURGT, so no 7k-clip blowup.
  ###===========================================================================================================================
  VAL_EVERY:
    value: 1
  VAL_SUBSAMPLE:
    value: null
  EARLY_STOP_PATIENCE:
    value: 12
  ROLLOUT_EVAL:
    value: true
  ROLLOUT_OBSERVE_STEPS:
    value: 4

  ###===========================================================================================================================
  ### BENCHMARK EVALUATION
  ###===========================================================================================================================
  EVAL_QUERY_MODE:
    value: first
  EVAL_AT_END:
    value: true
  EVAL_EVERY:
    value: 0
  EVAL_MAX_CLIPS:
    value: 30
  EVAL_BATCH_SIZE:
    value: 1
  EVAL_WORKERS:
    value: 4

  ###===========================================================================================================================
  ### LOGGING & VISUALIZATION
  ###===========================================================================================================================
  LOG_EVERY:
    value: 25
  VIZ_EVERY:
    value: 5
