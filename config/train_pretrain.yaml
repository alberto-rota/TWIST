###===============================================================================================================================
### train_pretrain.yaml  —  SYNTHETIC PRETRAINING at max data scale (Kubric + PointOdyssey), denser tracks
###===============================================================================================================================
### Provenance: forked from config/train_best_baseline.yaml, which is the config of the CURRENT BEST run
### (W&B twisteam/twist/ew4kyckz "deep-firefly-142", val/epe 6.24 / AJ 0.435 @ep24, still improving).
### VERIFIED 2026-07-16: the best run used train_best_baseline.yaml (auto W&B name, RESUME scratch,
### EPOCHS 100, KUBRIC 4000, CHOLEC80 25) — NOT train_red.yaml (that produced the weaker red run
### resilient-plasma-130 and has since been repurposed into a surgical-fork template).
###
### DELTAS vs train_best_baseline (deliberate DATA SCALE-UP — two levers stacked on purpose, not an ablation;
### if you want clean per-lever attribution, vary one at a time — Law 2):
###   1. KUBRIC       MAX_CLIPS 4000 -> null (uncapped = all 5251 clips on disk).  [+1251 clips, ~1.3x]
###   2. POINTODYSSEY MAX_CLIPS  cap -> null (uncapped = all 4436 clips).          [the big scale lever: ~2x synthetic
###                                                                                 data AND real through-occlusion GT]
###   3. DENSER TRACKS: KUBRIC MAX_POINTS 256 -> 512, POINTODYSSEY 256 -> 384.
###        Kubric stores 32,768 pts/clip (we sampled 0.8%); denser supervision is FREE (no re-tracking).
###        PointOdyssey/Cholec80 store only ~400 pts/clip -> 384 is near their hard ceiling.
###        NB: inter-point self-attention is O(N^2); 512 pts ~= 4x that block's cost vs 256. SMOKE-CHECK peak_mem
###        (python train.py <this> --EPOCHS=1 --MAX_STEPS_PER_EPOCH=2) BEFORE the real launch; drop BATCH_SIZE to
###        2-3 or revert MAX_POINTS to 256 on OOM.
###   4. CHOLEC80 dropped from training (it belongs to the surgical FINE-TUNE stage, not pretraining).
###   5. DYNAMICREPLICA made eval-only (VAL_FRACTION 1.0): it is an IS_EVAL benchmark we report — the baseline
###        trained on 90% of it (leakage). Kept for eval (has occluded GT -> good POR/through-occlusion probe).
###   6. Eval sets (DAVIS / SurgicalMotion / DynamicReplica) dropped from PER-EPOCH val via VAL_SUBSAMPLE: 0
###        (still benchmark-scored by EVAL_AT_END/EVERY) -> per-epoch val/epe is clean Kubric+PO only, killing the
###        (0,0)-placeholder val-pollution the audit flagged. Global VAL_SUBSAMPLE 0.25 keeps that val fast.
###   7. Fixed EXPERIMENT_NAME + RESUME: last (Law 5) — this is a 100-epoch run (~5 ep/24h wall => ~20 resubmits);
###        re-submitting the same sbatch CONTINUES from last.pt. (Baseline used auto-name+scratch, fine for one shot.)
###
### Launch (A100-80, single GPU):  sbatch .sbatch_scripts/train_cfg_a100_80.sbatch config/train_pretrain.yaml
### Resubmit (continues):          same command again.
###===============================================================================================================================

parameters:

  ###===========================================================================================================================
  ### RUN / GENERAL
  ###===========================================================================================================================
  EXPERIMENT_NAME:
    value: twist_pretrain_kubPO   # FIXED name (Law 5): resubmits of the same sbatch continue this run
  RESUME:
    value: last                   # continue from last.pt if it exists; scratch on the first launch
  WORKERS:
    value: 8
  PIN_MEMORY:
    value: true
  NO_WANDB:
    value: false
  WANDB_PROJECT:
    value: twist
  SEED:
    value: 42

  ###===========================================================================================================================
  ### DDP LR SCALING
  ###===========================================================================================================================
  # none -> LR invariant to GPU count (pair per-GPU BATCH_SIZE = global/N). sqrt -> grow effective batch. linear -> overshoots.
  LR_SCALING:
    value: none

  ###===========================================================================================================================
  ### MODEL — unchanged from train_best_baseline (t7imej6u architecture). No arch flags touched => resume-safe.
  ###===========================================================================================================================
  MODEL:
    value:
      MODEL_CLASS: TrackerWorldModel
      MODEL_MODULE: models
      HIDDEN_DIM: 256
      TOKEN_DIM: 256
      RGB_ENCODER:
        ENCODER: facebook/dinov3-vitl16-pretrain-lvd1689m
        IMAGE_SIZE: 512
        FREEZE_BACKBONE: true
        RGB_ENCODER_LR: 0.0
        FEATURE_LAYER: null
      OBSERVATION:
        K: 9
        RADIUS_PX: 16
        HEADS: 4
        MAX_CORR: 0.0
      TRANSITION:
        DEPTH: 2
        HEADS: 4
        MAX_STEP: 0.12
      ROLLOUT_VEL_DECAY: 1.0
      HEADS:
        UNCERTAINTY: true
      FEATURE_UPSAMPLE:
        ENABLED: false
        FACTOR: 2
        BOTTLENECK: 256

  ###===========================================================================================================================
  ### DATA — training sources = KUBRIC + POINTODYSSEY (uncapped, denser). Everything else is eval-only.
  ###===========================================================================================================================
  DATASETS:
    value:
      OVERRIDE_ALL_DATASETS:
        SPLIT_SEED: 42
        TARGET_SIZE: [512, 512]
        CLIP_LEN: 24
        LOAD_FRAMES: true
        LOAD_DEPTHS: false
        FRAMES_AS_FLOAT: false
        MARK_OFFSCREEN_INVISIBLE: true
        POINT_SAMPLE_MODE: even
        QUERY_FRAME: 0
        CLIP_STRIDE: null
        FRAME_STRIDE: 1
        REQUIRE_VISIBLE_AT_QUERY: true
        MIN_VISIBLE_FRAMES: 1
        RESIZE_MODE: cover

      KUBRIC:
        MAX_CLIPS: null       # uncapped -> all 5251 clips (was 4000)
        VAL_FRACTION: 0.1
        MAX_POINTS: 512       # denser (was 256); 32,768 stored per clip so this is free supervision

      POINTODYSSEY:
        MAX_CLIPS: null       # uncapped -> all 4436 clips; HAS_OCCLUDED_GT -> real through-occlusion supervision
        VAL_FRACTION: 0.1
        MAX_POINTS: 384       # near the ~400 stored ceiling (was 256)

      # ---- eval-only benchmarks: scored by EVAL_AT_END/EVERY, kept OUT of per-epoch val (VAL_SUBSAMPLE 0) ----
      TAPVID_DAVIS:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: true
        VAL_SUBSAMPLE: 0
      SURGICALMOTION:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: true
        VAL_SUBSAMPLE: 0
      DYNAMICREPLICA:
        VAL_FRACTION: 1.0     # eval-only now (baseline trained on it = leakage on a reported benchmark)
        IS_EVAL_DATASET: true
        VAL_SUBSAMPLE: 0

  ###===========================================================================================================================
  ### TRAINING (ENGINE)
  ###===========================================================================================================================
  BATCH_SIZE:
    value: 4                # per-GPU. bs6@512res/256pts ~= 75 GB; 512 pts raises it -> SMOKE-CHECK, drop to 2-3 on OOM.
  EPOCHS:
    value: 100
  LR:
    value: 3.0e-4           # pretraining LR (cosine); single-GPU value, LR_SCALING decides DDP behaviour
  WEIGHT_DECAY:
    value: 1.0e-4
  OPTIMIZER:
    value: adamw
  GRAD_CLIP:
    value: 1.0
  AMP:
    value: true
  LR_SCHEDULER:
    value: cosine
  WARMUP_EPOCHS:
    value: 3
  MIN_LR_RATIO:
    value: 0.05
  KL_WEIGHT_START:
    value: 0.0
  KL_ANNEAL_EPOCHS:
    value: 5
  TEACHER_FORCING_EPOCHS:
    value: 3
  OBS_DROPOUT:
    value: 0.3
  OBS_DROPOUT_EPOCHS:
    value: 5
  LOSS:
    value:
      POS_WEIGHT: 10.0      # position dominance (Law 1) — unchanged from the stable base
      VIS_WEIGHT: 0.5
      KL_WEIGHT: 0.05       # floor-pinned, harmless (KL is dead — Law 6)
      KL_FREE_BITS: 0.02
      KL_BALANCE_ALPHA: 0.8
      HUBER_DELTA: 0.2
      UNC_WEIGHT: 0.0
      PRIOR_WEIGHT: 0.5
      ROLLOUT_WEIGHT: 2.0

  ###===========================================================================================================================
  ### VALIDATION  —  per-epoch val = Kubric+PO only; subsampled for speed (val set is large now: ~970 clips uncapped).
  ###===========================================================================================================================
  VAL_EVERY:
    value: 1
  VAL_SUBSAMPLE:
    value: 0.25            # keep ~1/4 of each training dataset's val clips per epoch (eval sets overridden to 0 above)
  EARLY_STOP_PATIENCE:
    value: 15
  ROLLOUT_EVAL:
    value: true
  ROLLOUT_OBSERVE_STEPS:
    value: 4

  ###===========================================================================================================================
  ### BENCHMARK EVALUATION  —  monitor benchmarks periodically (cheap) + full pass at the end.
  ###===========================================================================================================================
  EVAL_QUERY_MODE:
    value: first
  EVAL_AT_END:
    value: true
  EVAL_EVERY:
    value: 20             # quick benchmark monitor every 20 epochs (capped by EVAL_MAX_CLIPS)
  EVAL_MAX_CLIPS:
    value: 30
  EVAL_BATCH_SIZE:
    value: 1
  EVAL_WORKERS:
    value: 4

  ###===========================================================================================================================
  ### LOGGING & VISUALIZATION
  ###===========================================================================================================================
  LOG_EVERY:
    value: 25
  VIZ_EVERY:
    value: 5
