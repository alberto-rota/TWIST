# TWIST — parallel ablation grid over the fine-localization / forecast levers.
#
# Clean 3-lever GRID (every cell), IMAGE_SIZE FIXED at 512 (not swept):
#   * LOSS.ROLLOUT_WEIGHT            2.0 vs 4.0     (push the frame-free forecast)
#   * MODEL.OBSERVATION.MAX_CORR     0.0 vs 0.05    (sub-cell soft-argmax refinement)
#   * MODEL.OBSERVATION.RADIUS_PX    24.0 vs 16.0   (cost-volume window tightness)
# => 2^3 = 8 trials = exactly one cell per A100-80 GPU (submit the agent job 8x,
# each agent grabs one cell and runs it from scratch on the SAME augmented mix, so
# each lever's effect is unconfounded).
#
# Why these three: the per-threshold val breakdown shows the gap is at TIGHT delta
# thresholds (9%/21% of pts within 1/2px though 89% within 16px) -> fine
# localization. MAX_CORR (enable the zero-init sub-cell residual) and a tighter
# RADIUS_PX (24->16 at K=9 = 4px sample spacing vs 6px) target that directly and
# cheaply; ROLLOUT_WEIGHT pushes the forecast horizon. delta_avg/AJ are the metrics
# these should move; mean EPE is tail-limited (data/robustness) and unlikely to.
# IMAGE_SIZE is held at 512 (prior analysis: 448->512 is only ~14% finer and
# upsamples a 448 frame — not worth a 4th grid dim).
#
# 24h-WALL FIX (the previous run of this grid, sweep vp0m8nqz, was KILLED by the
# SLURM 24h --time limit at epoch 14/25 with NO EVAL_AT_END -> no benchmark number):
# at 512, train compute was ~66 min/epoch + ~36 min val, and PointOdyssey (4436
# clips, then UNCAPPED) was ~80% of the train mix and the bulk of the val cost.
# So this revision (a) caps POINTODYSSEY at 1500 clips and (b) shortens EPOCHS to 20
# -> ~48 min/epoch wall -> ~16h + EVAL_AT_END, comfortably inside 24h. The historical
# plateau is by ~ep6, so 20 epochs is plenty to RANK cells; the winning config is
# then trained long on the FULL mix (config/train_r512_dynrep.yaml).
#
# Why from scratch (not warm-started from the live runs): warm-starting all cells
# from one plateaued checkpoint would measure a fine-tune delta from a shared
# basin, not each lever's true effect — and there is no clean cross-run init knob.
#
# EXPERIMENT_NAME is intentionally OMITTED so every trial adopts its unique W&B
# run name -> a unique $RESULTS_DIR/<name>/ (a fixed name would make trials clobber
# / resume each other).
#
# Launch (8x A100-80, one cell each):
#   wandb sweep config/sweep_ablations.yaml                                   # -> twisteam/twist/<SWEEP_ID>
#   for i in $(seq 8); do jsub -w 'wandb agent twisteam/twist/<SWEEP_ID>' agent_gpu/singlegpu/A100_80GB.sbatch; done
#
# Memory: BATCH_SIZE 6 @ 512 measured 75.3 GB peak on A100-80 (~5 GB headroom). It
# does NOT fit A100-40 (use bs2-3 there). Could push to 7 on 80GB; 6 is the safe pick.

program: sweep_agent.py
method: grid
metric:
  name: val/epoch/epe   # actual logged key (W&B UI "best run" tracking; grid ignores it for selection)
  goal: minimize
entity: twisteam
project: twist

parameters:

  ### RUN — no EXPERIMENT_NAME (unique per trial; see header)
  WANDB_PROJECT:
    value: twist
  RESUME:
    value: scratch
  WORKERS:
    value: 8
  PIN_MEMORY:
    value: true
  NO_WANDB:
    value: false
  SEED:
    value: 42

  ### TRAINING — fixed engine settings (swept knobs declared at the bottom)
  BATCH_SIZE:
    value: 6          # MEASURED 75.3 GB peak @ 512 on A100-80 (sweep vp0m8nqz) -> fits with
                      # ~5 GB headroom. Does NOT fit A100-40 (use bs2-3 there). Push to 7 only on 80GB.
  EPOCHS:
    value: 20         # short ablation trials; sized to finish + EVAL_AT_END inside the 24h wall (see header)
  LR:
    value: 3.0e-4
  WEIGHT_DECAY:
    value: 1.0e-4
  OPTIMIZER:
    value: adamw
  GRAD_CLIP:
    value: 1.0
  AMP:
    value: true
  LR_SCHEDULER:
    value: cosine
  WARMUP_EPOCHS:
    value: 3
  MIN_LR_RATIO:
    value: 0.05
  KL_WEIGHT_START:
    value: 0.0
  KL_ANNEAL_EPOCHS:
    value: 5
  TEACHER_FORCING_EPOCHS:
    value: 3
  OBS_DROPOUT:
    value: 0.3
  OBS_DROPOUT_EPOCHS:
    value: 5
  VAL_EVERY:
    value: 1
  EARLY_STOP_PATIENCE:
    value: 12         # cut losing cells early
  ROLLOUT_EVAL:
    value: true
  ROLLOUT_OBSERVE_STEPS:
    value: 4
  LOG_EVERY:
    value: 25
  VIZ_EVERY:
    value: 5

  ### BENCHMARK EVALUATION — one capped, CoTracker-comparable score per trial at the end
  EVAL_QUERY_MODE:
    value: first
  EVAL_AT_END:
    value: true
  EVAL_EVERY:
    value: 0
  EVAL_MAX_CLIPS:
    value: 30
  EVAL_BATCH_SIZE:
    value: 1
  EVAL_WORKERS:
    value: 4

  ### MODEL — base block. Swept nested fields MUST exist here so the dotted
  ### override at the bottom is type-coerced (IMAGE_SIZE).
  MODEL:
    value:
      MODEL_CLASS: TrackerWorldModel
      MODEL_MODULE: models
      HIDDEN_DIM: 256
      TOKEN_DIM: 256
      RGB_ENCODER:
        ENCODER: facebook/dinov3-vitl16-pretrain-lvd1689m
        IMAGE_SIZE: 512         # FIXED (not swept); see header
        FREEZE_BACKBONE: true
        RGB_ENCODER_LR: 0.0
      OBSERVATION: { K: 9, RADIUS_PX: 24.0, HEADS: 4, MAX_CORR: 0.0 }
      TRANSITION: { DEPTH: 2, HEADS: 4, MAX_STEP: 0.12 }
      ROLLOUT_VEL_DECAY: 1.0
      HEADS: { UNCERTAINTY: true }

  ### LOSS — base block. ROLLOUT_WEIGHT swept below (must exist here).
  LOSS:
    value:
      POS_WEIGHT: 10.0
      VIS_WEIGHT: 0.5
      KL_WEIGHT: 0.05
      KL_FREE_BITS: 0.02
      KL_BALANCE_ALPHA: 0.8
      HUBER_DELTA: 0.2
      UNC_WEIGHT: 0.0
      PRIOR_WEIGHT: 0.5
      ROLLOUT_WEIGHT: 2.0       # swept below

  ### DATA — same augmented mix as config/train_r512_dynrep.yaml (DynRep in train)
  DATASETS:
    value:
      OVERRIDE_ALL_DATASETS:
        SPLIT_SEED: 42
        TARGET_SIZE: [512, 512]
        CLIP_LEN: 24
        LOAD_FRAMES: true
        LOAD_DEPTHS: false
        FRAMES_AS_FLOAT: false
        MARK_OFFSCREEN_INVISIBLE: true
        POINT_SAMPLE_MODE: even
        QUERY_FRAME: 0
        CLIP_STRIDE: null
        FRAME_STRIDE: 1
        REQUIRE_VISIBLE_AT_QUERY: true
        MIN_VISIBLE_FRAMES: 1
      KUBRIC:
        VAL_FRACTION: 0.1
        MAX_CLIPS: 1000
      POINTODYSSEY:
        VAL_FRACTION: 0.1
        MAX_CLIPS: 1500   # capped for sweep throughput (was uncapped 4436 = ~80% of train + bulk
                          # of val cost -> the 24h kill). The long run (train_r512_dynrep) uses full PO.
      DYNAMICREPLICA:
        VAL_FRACTION: 0.1   # 120 clips, no cap needed
        IS_EVAL_DATASET: True

      CHOLEC80:
        VAL_FRACTION: 1.0
        MAX_CLIPS: 20
      TAPVID_DAVIS:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True
      SURGICALMOTION:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True

  ### SWEPT KNOBS — four levers (grid: 2^4 = 16 trials) -----------------------
  LOSS.ROLLOUT_WEIGHT:
    values: [2.0, 4.0]
  # Added fine-localization levers (target the tight-threshold delta gap):
  MODEL.OBSERVATION.MAX_CORR:
    values: [0.0, 0.05]        # 0 = pure soft-argmax; 0.05 = enable the zero-init sub-cell residual
  MODEL.OBSERVATION.RADIUS_PX:
    values: [24.0, 16.0]       # cost-volume window half-extent (16 -> 4px sample spacing at K=9)
