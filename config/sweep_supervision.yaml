# TWIST — supervision 2x2: through-occlusion GT x Huber shape, on the UNCHANGED
# v1 architecture (no coarse stage / stats / vis-input), so the two cheapest,
# highest-leverage TRAINING-ONLY levers from the 2026-07 diagnosis are measured
# unconfounded by the architecture changes (those ship in config/train_v2.yaml):
#
#   * LOSS.USE_OCCLUDED_GT   true vs false   [F1] position/prior/rollout terms use
#         pos_valid — Kubric's ~28% occluded-but-in-frame GT frames supervise the
#         coast-through-occlusion behaviour (false = the historical visible-only
#         mask). Expect: epe_occ appears + falls, val/rollout/* improves,
#         gate_occ drops (the gate finally gets a gradient at occluded frames).
#   * LOSS.HUBER_DELTA       0.2 vs 0.02     [F4a] ~51px (pure-L2 regime, tiny
#         small-error gradients) vs ~5px (L1-like beyond 5px). Expect: the stuck
#         delta_1px/2px (~0.09/0.15 across the whole fine-loc sweep) finally move.
#
# => 2^2 = 4 trials = 4 GPUs. Same data/protocol as config/train_best.yaml
# (KUBRIC-only uncapped) but 20 epochs — enough to RANK cells (the fine-loc sweep
# showed no train/val divergence at ep19); the winner's flags then merge into the
# long runs. EXPERIMENT_NAME intentionally OMITTED (unique W&B name per trial).
#
# Launch (4x A100-80, one cell each):
#   wandb sweep config/sweep_supervision.yaml                                 # -> twisteam/twist/<SWEEP_ID>
#   for i in $(seq 4); do jsub -w 'wandb agent twisteam/twist/<SWEEP_ID>' agent_gpu/singlegpu/A100_80GB.sbatch; done
#
# Memory: identical graph to train_best (v1 architecture, bs6 @ 512 ~75 GB peak).

program: sweep_agent.py
method: grid
metric:
  name: val/epoch/epe   # actual logged key (W&B UI "best run" tracking; grid ignores it)
  goal: minimize
entity: twisteam
project: twist

parameters:

  ### RUN — no EXPERIMENT_NAME (unique per trial)
  WANDB_PROJECT:
    value: twist
  RESUME:
    value: scratch
  WORKERS:
    value: 8
  PIN_MEMORY:
    value: true
  NO_WANDB:
    value: false
  SMOKE:
    value: false
  SEED:
    value: 42

  IMAGE_SIZE:
    value: 512

  ### MODEL — v1 winner, UNCHANGED (STATS/COARSE/VIS_INPUT stay off -> same state_dict)
  MODEL:
    value:
      MODEL_CLASS: TrackerWorldModel
      MODEL_MODULE: models
      HIDDEN_DIM: 256
      TOKEN_DIM: 256
      RGB_ENCODER:
        ENCODER: facebook/dinov3-vitl16-pretrain-lvd1689m
        FREEZE_BACKBONE: true
        RGB_ENCODER_LR: 0.0
      OBSERVATION: { K: 9, RADIUS_PX: 24.0, HEADS: 4, MAX_CORR: 0.0 }
      TRANSITION: { DEPTH: 2, HEADS: 4, MAX_STEP: 0.12 }
      ROLLOUT_VEL_DECAY: 1.0
      HEADS: { UNCERTAINTY: true }

  ### LOSS — base block; the two grid levers are swept below (must exist here).
  ### Everything else pinned at the v1 values (KL kept as-was so this sweep
  ### measures ONLY the two levers; KL retirement ships with train_v2).
  LOSS:
    value:
      POS_WEIGHT: 10.0
      VIS_WEIGHT: 0.5
      KL_WEIGHT: 0.05
      KL_FREE_BITS: 0.02
      KL_BALANCE_ALPHA: 0.8
      HUBER_DELTA: 0.2          # swept below
      UNC_WEIGHT: 0.0
      PRIOR_WEIGHT: 0.5
      ROLLOUT_WEIGHT: 2.0
      CE_WEIGHT: 0.0            # off: F4b ships with train_v2
      USE_OCCLUDED_GT: true     # swept below

  ### DATA — KUBRIC-only uncapped (same as train_best.yaml)
  DATASETS:
    value:
      OVERRIDE_ALL_DATASETS:
        SPLIT_SEED: 42
        CLIP_LEN: 24
        LOAD_FRAMES: true
        LOAD_DEPTHS: false
        FRAMES_AS_FLOAT: false
        MARK_OFFSCREEN_INVISIBLE: true
        POINT_SAMPLE_MODE: even
        QUERY_FRAME: 0
        CLIP_STRIDE: null
        FRAME_STRIDE: 1
        REQUIRE_VISIBLE_AT_QUERY: true
        MIN_VISIBLE_FRAMES: 1
      KUBRIC:
        VAL_FRACTION: 0.1
      TAPVID_DAVIS:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True
      TAPVID_RGB_STACKING:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True
      ROBOTAP:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True
      SURGICALMOTION:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True
      ENDOTAPP_GT:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True
      STIR_CHALLENGE:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True

  ### ENGINE — v1 schedule, 20 epochs (ranking run)
  BATCH_SIZE:
    value: 6
  EPOCHS:
    value: 20
  LR:
    value: 3.0e-4
  WEIGHT_DECAY:
    value: 1.0e-4
  OPTIMIZER:
    value: adamw
  GRAD_CLIP:
    value: 1.0
  AMP:
    value: true
  LR_SCHEDULER:
    value: cosine
  WARMUP_EPOCHS:
    value: 3
  MIN_LR_RATIO:
    value: 0.05
  KL_WEIGHT_START:
    value: 0.0
  KL_ANNEAL_EPOCHS:
    value: 5
  TEACHER_FORCING_EPOCHS:
    value: 3
  OBS_DROPOUT:
    value: 0.3
  OBS_DROPOUT_EPOCHS:
    value: 5
  OBS_DROPOUT_SPAN:
    value: [3, 8]   # per-point occlusion-shaped spans (engine default; explicit here)

  ### VALIDATION / EVAL
  VAL_EVERY:
    value: 1
  EARLY_STOP_PATIENCE:
    value: 20
  ROLLOUT_EVAL:
    value: true
  ROLLOUT_OBSERVE_STEPS:
    value: 4
  EVAL_QUERY_MODE:
    value: first
  EVAL_AT_END:
    value: true
  EVAL_EVERY:
    value: 10
  EVAL_MAX_CLIPS:
    value: 30
  EVAL_BATCH_SIZE:
    value: 1
  EVAL_WORKERS:
    value: 4

  ### LOGGING (lean for sweep trials)
  LOG_EVERY:
    value: 20
  VIZ_EVERY:
    value: 5
  VIZ_VAL_CLIPS:
    value: 1
  VIZ_EVERY_BATCHES:
    value: 0
  VIZ_DENSE_SPACING:
    value: 0
  VIZ_FRAMES:
    value: 24
  VIZ_MAX_POINTS:
    value: 48
  VIZ_SIZE:
    value: 256
  VIZ_TAIL:
    value: 12
  VIZ_FPS:
    value: 8

  ###=========================================================================
  ### THE 2x2 GRID
  ###=========================================================================
  LOSS.USE_OCCLUDED_GT:
    values: [true, false]
  LOSS.HUBER_DELTA:
    values: [0.2, 0.02]
