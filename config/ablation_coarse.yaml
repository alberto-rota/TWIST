# TWIST ABLATION — F3 coarse re-acquisition ONLY (on stable baseline)
# Base = config/train_best.yaml (stable v1 recipe, KUBRIC-only). One v2 block added.
# 20-epoch ranking run (matches config/sweep_supervision.yaml protocol).
#
# PROVENANCE — hyperparameters copied from the best sweep run by the standardized,
# CoTracker-comparable benchmark (eval/MEAN, TAP-Vid "queried first"):
#
#   BEST RUN: twisteam/twist/fqbpeml7  (snowy-sweep-1)
#     eval/MEAN  EPE 11.19 (lowest)   AJ 0.258 (highest)   delta_avg 0.377
#     -> alone on the Pareto front: lowest EPE AND highest AJ of every run that
#        completed EVAL_AT_END. This is the fine-loc cell RAD=24 / MAX_CORR=0 /
#        ROLLOUT_WEIGHT=2 that config/sweep_ablations.yaml designated as the winner.
#
#   NOT t7imej6u (eternal-sweep-2): it CRASHED at epoch 14/25 so it produced NO
#   benchmark score (eval/MEAN absent); its only numbers are train-set val metrics
#   on a different (uncapped-PointOdyssey) mix, and it is a RAD=16 cell — the
#   inferior fine-loc half (RAD=16/MC=0 = neat-sweep-2 scored eval EPE 13.78 / AJ
#   0.194, decisively worse than this RAD=24/MC=0 cell).
#
#   PROTOCOL NOTE (2026-07-07): the 11.19 / 13.78 numbers above are OLD-protocol
#   (pre-2026-06-30 24-frame-chopped, capped-clip eval). They remain valid as the
#   fine-loc sweep's INTERNAL ranking (same era, controlled) -> RAD=24 stands.
#   They are NOT comparable to whole-video numbers: t7imej6u was later scored
#   MEAN EPE 38.58 under the post-fix whole-video protocol (where CoTracker3
#   zero-shot = 20.12), so "decisively worse"/"eval/MEAN absent" above is stale.
#   fqbpeml7 has NO whole-video score yet (re-eval: python evaluate.py --run snowy-sweep-1).
#
# WHAT CHANGED vs config/train_r512_dynrep.yaml (the prior long-run template):
#   * TRAIN DATA = KUBRIC ONLY, UNCAPPED (full dataset). PointOdyssey,
#     DynamicReplica and Cholec80 are removed from the TRAIN mix. The held-out
#     benchmark datasets (TAP-Vid / RoboTAP / surgical / STIR) are kept as
#     IS_EVAL_DATASET so EPE/AJ are still scored — they are never trained on.
#   * Everything else (model, loss, engine, schedule) is the validated winner,
#     verbatim from snowy-sweep-1.
#
# Launch (A100-80, one GPU; re-submit same EXPERIMENT_NAME to auto-resume last.pt):
#   sbatch .sbatch_scripts/train_a100.sbatch                 # edit it to point at this config, or:
#   python train.py config/train_best.yaml
# Memory: BATCH_SIZE 6 @ 512 measured ~75 GB peak on A100-80. Kubric-only drops the
# per-epoch wall a lot vs the mix (PointOdyssey was ~80% of the old train compute).

parameters:

  ###===========================================================================================================================
  ### RUN / GENERAL
  ###===========================================================================================================================
  EXPERIMENT_NAME:
    # FIXED name + RESUME=last so a SLURM-timeout resubmit CONTINUES from last.pt
    # (blank-name + scratch randomizes the name each submit and lost 3 prior runs
    # to the 24h wall — see CLAUDE.md). First submit still inits fresh (no last.pt).
    value: abl_coarse_r512
  RESUME:
    value: scratch  # ablation arch/loss differs from baseline -> fresh init
  WORKERS:
    value: 8
  PIN_MEMORY:
    value: true
  NO_WANDB:
    value: false
  SMOKE:
    value: false
  WANDB_PROJECT:
    value: twist
  SEED:
    value: 42

  IMAGE_SIZE:
    value: 512

  ###===========================================================================================================================
  ### MODEL — validated winner (snowy-sweep-1): OBSERVATION RAD=24 / MAX_CORR=0, K=9
  ###===========================================================================================================================
  MODEL:
    value:
      MODEL_CLASS: TrackerWorldModel
      MODEL_MODULE: models
      HIDDEN_DIM: 256
      TOKEN_DIM: 256
      RGB_ENCODER:
        ENCODER: facebook/dinov3-vitl16-pretrain-lvd1689m
        # IMAGE_SIZE set by the top-level IMAGE_SIZE knob (see RUN / GENERAL)
        FREEZE_BACKBONE: true
        RGB_ENCODER_LR: 0.0
      OBSERVATION:
        K: 9
        RADIUS_PX: 24.0     # winning fine-loc window (RAD=16 was the worse half)
        HEADS: 4
        MAX_CORR: 0.0       # pure soft-argmax (0.05 sub-cell residual did not help)
        COARSE: true        # [ablation F3] global template re-acquisition stage
      TRANSITION:
        DEPTH: 2
        HEADS: 4
        MAX_STEP: 0.12
      ROLLOUT_VEL_DECAY: 1.0
      HEADS:
        UNCERTAINTY: true

  ###===========================================================================================================================
  ### DATA — TRAIN: full KUBRIC only.  EVAL: held-out benchmarks (never trained on).
  ###===========================================================================================================================
  DATASETS:
    value:
      OVERRIDE_ALL_DATASETS:
        SPLIT_SEED: 42
        # TARGET_SIZE set by the top-level IMAGE_SIZE knob (-> [512, 512]; no upsample)
        CLIP_LEN: 24
        LOAD_FRAMES: true
        LOAD_DEPTHS: false
        FRAMES_AS_FLOAT: false
        MARK_OFFSCREEN_INVISIBLE: true
        POINT_SAMPLE_MODE: even
        QUERY_FRAME: 0
        CLIP_STRIDE: null
        FRAME_STRIDE: 1
        REQUIRE_VISIBLE_AT_QUERY: true
        MIN_VISIBLE_FRAMES: 1

      ### TRAINING + VALIDATION — KUBRIC ONLY, full dataset (no MAX_CLIPS cap)
      KUBRIC:
        VAL_FRACTION: 0.1   # 90% train / 10% in-training val; UNCAPPED = full Kubric

      ### BENCHMARK EVALUATION (held-out; scored by utilities.evaluation; not trained on)
      TAPVID_DAVIS:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True
      TAPVID_RGB_STACKING:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True
      ROBOTAP:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True
      SURGICALMOTION:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True
      ENDOTAPP_GT:               # surgical TAP GT (EndoTAPP)
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True
      STIR_CHALLENGE:            # headline surgical benchmark (MICCAI 2024 held-out)
        VAL_FRACTION: 1.0        # native-res; delta over [4,8,16,32,64]px (EVAL_THRESHOLDS in registry)
        IS_EVAL_DATASET: True
      STIR_FULL:                 # larger STIR train/val release
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: True
      # TAPVID_KINETICS: left out of the in-training monitor (large); score it
      # offline with evaluate.py for the final headline number.

  ###===========================================================================================================================
  ### TRAINING (ENGINE) — validated winner schedule
  ###===========================================================================================================================
  BATCH_SIZE:
    value: 6  # snowy-sweep-1 (provenance) value; ~75 GB peak @ 512 on A100-80. Kubric-only
              # train tensor is unchanged vs the mix; drop to 4 if OOM, push to 8 if there's room.
  EPOCHS:
    value: 20
  LR:
    value: 3.0e-4
  WEIGHT_DECAY:
    value: 1.0e-4
  OPTIMIZER:
    value: adamw
  GRAD_CLIP:
    value: 1.0
  AMP:
    value: true
  LR_SCHEDULER:
    value: cosine
  WARMUP_EPOCHS:
    value: 3
  MIN_LR_RATIO:
    value: 0.05
  KL_WEIGHT_START:
    value: 0.0
  KL_ANNEAL_EPOCHS:
    value: 5
  TEACHER_FORCING_EPOCHS:
    value: 3
  OBS_DROPOUT:
    value: 0.3
  OBS_DROPOUT_EPOCHS:
    value: 5
  LOSS:
    value:
      POS_WEIGHT: 10.0
      VIS_WEIGHT: 0.5
      KL_WEIGHT: 0.05
      KL_FREE_BITS: 0.02
      KL_BALANCE_ALPHA: 0.8
      HUBER_DELTA: 0.2
      UNC_WEIGHT: 0.0
      PRIOR_WEIGHT: 0.5
      ROLLOUT_WEIGHT: 2.0  # A/B-validated winner; keep

  ###===========================================================================================================================
  ### VALIDATION
  ###===========================================================================================================================
  VAL_EVERY:
    value: 1
  EARLY_STOP_PATIENCE:
    value: 20
  ROLLOUT_EVAL:
    value: true
  ROLLOUT_OBSERVE_STEPS:
    value: 4

  ###===========================================================================================================================
  ### BENCHMARK EVALUATION
  ###===========================================================================================================================
  EVAL_QUERY_MODE:
    value: first  # TAP-Vid "queried first" (CoTracker-comparable)
  EVAL_AT_END:
    value: true
  EVAL_EVERY:
    value: 10     # capped monitor during training (headline number: evaluate.py uncapped)
  EVAL_MAX_CLIPS:
    value: 30     # cheap monitor; remove / raise for the final number
  EVAL_BATCH_SIZE:
    value: 1
  EVAL_WORKERS:
    value: 4

  ###===========================================================================================================================
  ### LOGGING & VISUALIZATION
  ###===========================================================================================================================
  LOG_EVERY:
    value: 5
  VIZ_EVERY:
    value: 1
  VIZ_VAL_CLIPS:
    value: 1
  VIZ_EVERY_BATCHES:
    value: 50
  VIZ_DENSE_SPACING:
    value: 48
  VIZ_DENSE_MAX_POINTS:
    value: 400
  VIZ_FRAMES:
    value: 48
  VIZ_MAX_POINTS:
    value: 48
  VIZ_SIZE:
    value: 256
  VIZ_TAIL:
    value: 12
  VIZ_DPI:
    value: 56
  VIZ_FPS:
    value: 8
