parameters:

  ###===========================================================================================================================
  ### RUN / GENERAL
  ###===========================================================================================================================
  EXPERIMENT_NAME:
    value:    # FIXED name (Law 5): resubmits continue this run. FRESH name — fusion is an
                                        # arch change, so this must NOT resume the null-layer flagship (strict=False drop).
  RESUME:
    value: scratch                      # continue from last.pt if it exists; scratch on the first launch
  WORKERS:
    value: 8
  PIN_MEMORY:
    value: true
  NO_WANDB:
    value: false
  WANDB_PROJECT:
    value: twist
  SEED:
    value: 42

  ###===========================================================================================================================
  ### DDP LR SCALING
  ###===========================================================================================================================
  # none -> LR invariant to GPU count (pair per-GPU BATCH_SIZE = global/N). sqrt -> grow effective batch. linear -> overshoots.
  LR_SCALING:
    value: none

  ###===========================================================================================================================
  ### MODEL — ARCH CHANGE vs the null-layer flagship: multi-layer DINOv3 feature fusion (FEATURE_FUSE). Fresh run identity
  ###         above; NOT resume-safe against a non-fusion checkpoint (see bottom note).
  ###===========================================================================================================================
  MODEL:
    value:
      MODEL_CLASS: TrackerWorldModel
      MODEL_MODULE: models
      HIDDEN_DIM: 256
      TOKEN_DIM: 256
      RGB_ENCODER:
        ENCODER: facebook/dinov3-vitl16-pretrain-lvd1689m
        IMAGE_SIZE: 512
        FREEZE_BACKBONE: true
        RGB_ENCODER_LR: 0.0
        FEATURE_LAYER: null     
      OBSERVATION:
        K: 9
        RADIUS_PX: 24
        HEADS: 4
        MAX_CORR: 0.0
      TRANSITION:
        DEPTH: 2
        HEADS: 4
        MAX_STEP: 0.12
      ROLLOUT_VEL_DECAY: 1.0
      HEADS:
        UNCERTAINTY: true
      FEATURE_UPSAMPLE:
        ENABLED: true
        FACTOR: 2
        BOTTLENECK: 256
      FEATURE_FUSE:
        ENABLED: true
        LAYERS: [-12, -9, -6]    
        ANCHOR: -9               # block 16 won the ablation

  ###===========================================================================================================================
  ### DATA — training sources = KUBRIC + POINTODYSSEY (uncapped, denser). Everything else is eval-only.
  ###===========================================================================================================================
  DATASETS:
    value:
      OVERRIDE_ALL_DATASETS:
        SPLIT_SEED: 42
        TARGET_SIZE: [512, 512]
        CLIP_LEN: 24
        LOAD_FRAMES: true
        LOAD_DEPTHS: false
        FRAMES_AS_FLOAT: false
        MARK_OFFSCREEN_INVISIBLE: true
        POINT_SAMPLE_MODE: random         
        RESAMPLE_POINTS_PER_EPOCH: true   
        QUERY_FRAME: 0
        CLIP_STRIDE: null
        FRAME_STRIDE: 1
        REQUIRE_VISIBLE_AT_QUERY: true
        MIN_VISIBLE_FRAMES: 1
        RESIZE_MODE: cover

      # Pretraining mix : Kubric + PO, all clips
      KUBRIC:
        MAX_CLIPS: null       
        VAL_FRACTION: 0.025
        MAX_POINTS: 300       

      POINTODYSSEY:
        MAX_CLIPS: null       
        VAL_FRACTION: 0.025
        MAX_POINTS: 256   # Max for PO is 400    

      # Eval in-the-wild mix : DAVIS 
      TAPVID_DAVIS:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: true
        VAL_SUBSAMPLE: 0

      # Eval surgery mix : SurgicalMotion + EndoTaPP + VLSURGPT + STIRc
      SURGICALMOTION:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: true
        VAL_SUBSAMPLE: 0.2

      ENDOTAPP_GT:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: true
        VAL_SUBSAMPLE: 0.2

      VLSURGPT:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: true
        VAL_SUBSAMPLE: 0.0

      STIR_CHALLENGE:
        VAL_FRACTION: 1.0     
        IS_EVAL_DATASET: true
        VAL_SUBSAMPLE: 0.0

      #----- EXCLUDED ----
      CHOLEC80:
        VAL_FRACTION: -1.0    
        IS_EVAL_DATASET: true 
        VAL_SUBSAMPLE: 0.0

      DYNAMICREPLICA:
        VAL_FRACTION: 1.0     
        IS_EVAL_DATASET: true
        VAL_SUBSAMPLE: 0.2

  ###===========================================================================================================================
  ### TRAINING (ENGINE)
  ###===========================================================================================================================
  BATCH_SIZE:
    value: 6                # per-GPU. bs6@512res/256pts ~= 75 GB; 512 pts raises it -> SMOKE-CHECK, drop to 2-3 on OOM.
  EPOCHS:
    value: 200
  LR:
    value: 3.0e-4           # pretraining LR (cosine); single-GPU value, LR_SCALING decides DDP behaviour
  WEIGHT_DECAY:
    value: 1.0e-4
  OPTIMIZER:
    value: adamw
  GRAD_CLIP:
    value: 1.0
  AMP:
    value: true
  LR_SCHEDULER:
    value: cosine
  WARMUP_EPOCHS:
    value: 3
  MIN_LR_RATIO:
    value: 0.05
  KL_WEIGHT_START:
    value: 0.0
  KL_ANNEAL_EPOCHS:
    value: 5
  TEACHER_FORCING_EPOCHS:
    value: 3
  OBS_DROPOUT:
    value: 0.3
  OBS_DROPOUT_EPOCHS:
    value: 5
  LOSS:
    value:
      POS_WEIGHT: 10.0      # position dominance (Law 1) — unchanged from the stable base
      VIS_WEIGHT: 0.5
      KL_WEIGHT: 0.05       # floor-pinned, harmless (KL is dead — Law 6)
      KL_FREE_BITS: 0.02
      KL_BALANCE_ALPHA: 0.8
      HUBER_DELTA: 0.2
      UNC_WEIGHT: 0.0
      PRIOR_WEIGHT: 0.5
      ROLLOUT_WEIGHT: 2.0

  ###===========================================================================================================================
  ### VALIDATION  —  per-epoch val = Kubric+PO only; subsampled for speed (val set is large now: ~970 clips uncapped).
  ###===========================================================================================================================
  VAL_EVERY:
    value: 1
  VAL_SUBSAMPLE:
    value: 0.1            # keep ~1/4 of each training dataset's val clips per epoch (eval sets overridden to 0 above)
  EARLY_STOP_PATIENCE:
    value: 15
  ROLLOUT_EVAL:
    value: true
  ROLLOUT_OBSERVE_STEPS:
    value: 4

  ###===========================================================================================================================
  ### BENCHMARK EVALUATION  —  monitor benchmarks periodically (cheap) + full pass at the end.
  ###===========================================================================================================================
  EVAL_QUERY_MODE:
    value: first
  EVAL_AT_END:
    value: true
  EVAL_EVERY:
    value: 0
  EVAL_MAX_CLIPS:
    value: null
  EVAL_DATASETS:
    value: [SURGICALMOTION, ENDOTAPP_GT, VLSURGPT, STIR_CHALLENGE]
  EVAL_EVERY_EXCLUDE:
    value: [STIR_CHALLENGE]
  EVAL_BATCH_SIZE:
    value: 1
  EVAL_WORKERS:
    value: 4
  EVAL_VISUALIZE:
    value: false

  ###===========================================================================================================================
  ### LOGGING & VISUALIZATION
  ###===========================================================================================================================
  LOG_EVERY:
    value: 25
  VIZ_EVERY:
    value: 10

# ═══════════════════════════════════════════════════════════════════════════════
# NOTES — benchmark-eval monitoring (2026-07-20)
# ═══════════════════════════════════════════════════════════════════════════════
# Goal: track the reportable surgical-benchmark metrics (W&B eval/*) EVERY epoch
# during training, without spending the 24h SLURM wall on it.
#   EVAL_EVERY 1 + EVAL_MAX_CLIPS null: score the WHOLE (small) surgical datasets each
#       epoch, so per-epoch eval/* equals the numbers you'll report (uncapped). NB:
#       val/epoch/* is a DIFFERENT protocol (frame-0 query, 24-frame clips) and cannot
#       be made equal to eval/* by dataset choice.
#   EVAL_DATASETS: allowlist — eval runs EXACTLY these, ignoring IS_EVAL_DATASET flags.
#       Surgical only; general TAP sets (DAVIS/RoboTAP/Kinetics/RGB) are run offline on
#       checkpoints (a config without EVAL_DATASETS falls back to the IS_EVAL scan).
#   EVAL_EVERY_EXCLUDE: drop STIR from the per-epoch monitor (clips up to 2006 frames ->
#       slow); STIR is still scored once by EVAL_AT_END.
#   EVAL_VISUALIZE false: metrics only — skip the CPU-bound render/mp4-encode/upload.
#
# ═══════════════════════════════════════════════════════════════════════════════
# NOTES — multi-layer feature fusion (2026-07-21)
# ═══════════════════════════════════════════════════════════════════════════════
# FEATURE_FUSE reads K DINOv3 blocks (LAYERS) as separate dense maps and projects
# their concatenation K*C -> C (MultiLayerFusion, models/world_model.py); runs BEFORE
# FEATURE_UPSAMPLE, so the two compose (fuse C, then upsample C).
#   WHY these layers: the 2026-07-21 FEATURE_LAYER ablation (runs pvgav2mt/6nrt93sa/
#     7x7benmq/wsrhdun9/sj1yed19) found an inverted-U over depth — block 16 (-9) won
#     localization decisively (val/epe 6.08 vs 10.49 last-layer), block 13 (-12) 2nd,
#     late blocks (19/24) worse at localization but more semantically invariant (useful
#     for re-acquisition). {-12,-9,-6} = {loc-low, loc-peak, semantic} spans that band.
#   PASS-THROUGH INIT (safety floor): the fusion proj is identity on the ANCHOR (-9,
#     block 16) slice, zero elsewhere -> at init the fused map == block 16 EXACTLY, so
#     this run STARTS equivalent to the frozen -9 winner and can only *add* the other
#     blocks' signal. Verified in workshops/44 (max|fused-anchor| = 0). No loss-balance
#     risk (the head touches no loss weight — Law 1 untouched).
#   RUN IDENTITY: fresh EXPERIMENT_NAME (arch changed) — do NOT resume the null flagship.
#   LAW 2 CAVEAT: this flagship also carries the point-resampling levers (POINT_SAMPLE_MODE
#     random + RESAMPLE_POINTS_PER_EPOCH, still unproven). For clean fusion-only attribution,
#     bench fusion vs frozen -9 at matched epochs on a 20-ep ranking config first.
  