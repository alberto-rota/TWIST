###===============================================================================================================================
### train_surg_finetune.yaml  —  STAGE 2: surgical fine-tune (Cholec80 CoTracker3 pseudo-labels), from the strong pretrain
###===============================================================================================================================
### Purpose: adapt the synthetic pretrain (train_pretrain.yaml) to the surgical domain, supervised on Cholec80's stored
### cotracker_tracks — which ARE CoTracker3 pseudo-labels (the "CoTracker3 as teacher" you asked for; distillation is
### offline, baked into the stored GT, no online teacher).
###
### FIXES vs the quick test fqrnbzh8 / train_red_surg.yaml (which barely moved surgical benchmarks and eroded the gate):
###   1. RESUME from the STRONG pretrain (twist_pretrain_kubPO), NOT red (resilient-plasma-130 = 1000 Kubric / 25 ep).
###   2. CHOLEC80 MAX_CLIPS 1000 -> 8000 (of 19,225 available; fqrnbzh8 used ~5% of the surgical signal).
###   3. KEEP a Kubric+PO rehearsal slice IN VAL (VAL_FRACTION 0.1, not dropped): fqrnbzh8 dropped Kubric from val, so
###      epe_occ was identically 0 and gate_occ silently climbed 0.73->0.90 (occlusion skill eroding, undetected).
###      Now Kubric/PO stay in per-epoch val -> gate_vis/gate_occ/epe_occ/rollout remain observable during fine-tune.
###   4. Rehearsal in TRAINING too (Kubric 2000 + PO 1000) to fight catastrophic forgetting of the through-occlusion skill.
###   5. EARLY_STOP_PATIENCE 8 (fqrnbzh8 peaked ~ep10 then overfit to ep22); rely on best.pt.
###
### Architecture is IDENTICAL to the pretrain (only DATA/LR/schedule differ) => strict=True-safe resume (Law: arch change
### => fresh name; here NO arch change, so resuming the pretrain weights is correct and lossless).
###
### PREREQUISITE: twist_pretrain_kubPO must have a best.pt first. To fine-tune the current best (brown) instead while the
###   pretrain runs, set RESUME: deep-firefly-142:best (ew4kyckz).
###
### Launch:  sbatch .sbatch_scripts/train_cfg_a100_80.sbatch config/train_surg_finetune.yaml
###===============================================================================================================================

parameters:

  ###===========================================================================================================================
  ### RUN / GENERAL  —  fork a fresh run named "<source>_surg" from the pretrain checkpoint
  ###===========================================================================================================================
  EXPERIMENT_NAME:
    value: null                        # RESUME_NAME sets the output name when forking
  RESUME:
    value: twist_pretrain_kubPO:best   # <- the strong pretrain. (fallback: deep-firefly-142:best to fork from brown)
  RESUME_NAME:
    value: "{source}_surg"
  RESUME_CHECKPOINT:
    value: best
  WORKERS:
    value: 8
  PIN_MEMORY:
    value: true
  NO_WANDB:
    value: false
  WANDB_PROJECT:
    value: twist
  SEED:
    value: 42

  LR_SCALING:
    value: none

  ###===========================================================================================================================
  ### MODEL — identical to train_pretrain.yaml (resume-safe)
  ###===========================================================================================================================
  MODEL:
    value:
      MODEL_CLASS: TrackerWorldModel
      MODEL_MODULE: models
      HIDDEN_DIM: 256
      TOKEN_DIM: 256
      RGB_ENCODER:
        ENCODER: facebook/dinov3-vitl16-pretrain-lvd1689m
        IMAGE_SIZE: 512
        FREEZE_BACKBONE: true
        RGB_ENCODER_LR: 0.0
        FEATURE_LAYER: null
      OBSERVATION:
        K: 9
        RADIUS_PX: 16
        HEADS: 4
        MAX_CORR: 0.0
      TRANSITION:
        DEPTH: 2
        HEADS: 4
        MAX_STEP: 0.12
      ROLLOUT_VEL_DECAY: 1.0
      HEADS:
        UNCERTAINTY: true
      FEATURE_UPSAMPLE:
        ENABLED: false
        FACTOR: 2
        BOTTLENECK: 256

  ###===========================================================================================================================
  ### DATA — surgical signal (Cholec80 pseudo-GT) + synthetic rehearsal (Kubric/PO, kept in val for gate diagnostics)
  ###===========================================================================================================================
  DATASETS:
    value:
      OVERRIDE_ALL_DATASETS:
        SPLIT_SEED: 42
        TARGET_SIZE: [512, 512]
        CLIP_LEN: 24
        LOAD_FRAMES: true
        LOAD_DEPTHS: false
        FRAMES_AS_FLOAT: false
        MARK_OFFSCREEN_INVISIBLE: true
        POINT_SAMPLE_MODE: even
        QUERY_FRAME: 0
        CLIP_STRIDE: null
        FRAME_STRIDE: 1
        REQUIRE_VISIBLE_AT_QUERY: true
        MIN_VISIBLE_FRAMES: 1
        RESIZE_MODE: cover

      CHOLEC80:
        MAX_CLIPS: 8000       # real surgical training signal (of 19,225 avail; raise toward null for the full set)
        VAL_FRACTION: 0.1

      # ---- synthetic rehearsal: keep the through-occlusion skill from decaying; KEPT IN VAL for gate diagnostics ----
      KUBRIC:
        MAX_CLIPS: 2000
        VAL_FRACTION: 0.1     # NOT dropped -> epe_occ / gate_occ / rollout stay observable during fine-tune
      POINTODYSSEY:
        MAX_CLIPS: 1000
        VAL_FRACTION: 0.1

      # ---- surgical + TAP eval benchmarks (scored at end; kept out of per-epoch val) ----
      SURGICALMOTION:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: true
        VAL_SUBSAMPLE: 0
      STIR_CHALLENGE:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: true
        VAL_SUBSAMPLE: 0
      ENDOTAPP_GT:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: true
        VAL_SUBSAMPLE: 0
      VLSURGPT:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: true
        VAL_SUBSAMPLE: 0
      TAPVID_DAVIS:
        VAL_FRACTION: 1.0
        IS_EVAL_DATASET: true
        VAL_SUBSAMPLE: 0

  ###===========================================================================================================================
  ### TRAINING (ENGINE)  —  low LR fine-tune schedule
  ###===========================================================================================================================
  BATCH_SIZE:
    value: 6                # 256 pts (defaults) here, so bs6 @512 ~= 75 GB fits; drop to 4 on OOM
  EPOCHS:
    value: 20
  LR:
    value: 1.0e-5           # fine-tune LR (not the 3e-4 pretrain LR)
  WEIGHT_DECAY:
    value: 1.0e-4
  OPTIMIZER:
    value: adamw
  GRAD_CLIP:
    value: 1.0
  AMP:
    value: true
  LR_SCHEDULER:
    value: cosine
  WARMUP_EPOCHS:
    value: 1
  MIN_LR_RATIO:
    value: 0.05
  KL_WEIGHT_START:
    value: 0.05            # already at the base value (no anneal needed mid-fine-tune)
  KL_ANNEAL_EPOCHS:
    value: 1
  TEACHER_FORCING_EPOCHS:
    value: 0               # weights are already trained; don't re-teacher-force
  OBS_DROPOUT:
    value: 0.3             # keep the occlusion regime during fine-tune
  OBS_DROPOUT_EPOCHS:
    value: 1
  LOSS:
    value:
      POS_WEIGHT: 10.0
      VIS_WEIGHT: 0.5
      KL_WEIGHT: 0.05
      KL_FREE_BITS: 0.02
      KL_BALANCE_ALPHA: 0.8
      HUBER_DELTA: 0.2
      UNC_WEIGHT: 0.0
      PRIOR_WEIGHT: 0.5
      ROLLOUT_WEIGHT: 2.0

  ###===========================================================================================================================
  ### VALIDATION
  ###===========================================================================================================================
  VAL_EVERY:
    value: 1
  VAL_SUBSAMPLE:
    value: null            # small val here (Cholec80 0.1 + Kubric/PO caps); no blow-up risk (no SURGT)
  EARLY_STOP_PATIENCE:
    value: 8               # fqrnbzh8 peaked ~ep10 then overfit; stop near the peak, keep best.pt
  ROLLOUT_EVAL:
    value: true
  ROLLOUT_OBSERVE_STEPS:
    value: 4

  ###===========================================================================================================================
  ### BENCHMARK EVALUATION
  ###===========================================================================================================================
  EVAL_QUERY_MODE:
    value: first
  EVAL_AT_END:
    value: true
  EVAL_EVERY:
    value: 1
  EVAL_MAX_CLIPS:
    value: null
  EVAL_DATASETS:
    value: [SURGICALMOTION, ENDOTAPP_GT, VLSURGPT, STIR_CHALLENGE]
  EVAL_EVERY_EXCLUDE:
    value: [STIR_CHALLENGE]
  EVAL_BATCH_SIZE:
    value: 1
  EVAL_WORKERS:
    value: 4
  EVAL_VISUALIZE:
    value: false

  ###===========================================================================================================================
  ### LOGGING & VISUALIZATION
  ###===========================================================================================================================
  LOG_EVERY:
    value: 25
  VIZ_EVERY:
    value: 5

# ═══════════════════════════════════════════════════════════════════════════════
# NOTES — benchmark-eval monitoring (2026-07-20)
# ═══════════════════════════════════════════════════════════════════════════════
# Goal: track the reportable surgical-benchmark metrics (W&B eval/*) EVERY epoch
# during training, without spending the 24h SLURM wall on it.
#   EVAL_EVERY 1 + EVAL_MAX_CLIPS null: score the WHOLE (small) surgical datasets each
#       epoch, so per-epoch eval/* equals the numbers you'll report (uncapped). NB:
#       val/epoch/* is a DIFFERENT protocol (frame-0 query, 24-frame clips) and cannot
#       be made equal to eval/* by dataset choice.
#   EVAL_DATASETS: allowlist — eval runs EXACTLY these, ignoring IS_EVAL_DATASET flags.
#       Surgical only; general TAP sets (DAVIS/RoboTAP/Kinetics/RGB) are run offline on
#       checkpoints (a config without EVAL_DATASETS falls back to the IS_EVAL scan).
#   EVAL_EVERY_EXCLUDE: drop STIR from the per-epoch monitor (clips up to 2006 frames ->
#       slow); STIR is still scored once by EVAL_AT_END.
#   EVAL_VISUALIZE false: metrics only — skip the CPU-bound render/mp4-encode/upload.
